            {

                icon: Shield,
                content: [
                    { title: "資安治理與風險觀念", text: "資訊安全不僅僅是技術問題，更是管理議題。這是一個「取捨 (Trade-off)」的藝術：安全性越高，通常便利性越低，成本越高。\n\n核心公式：風險 (Risk) = 資產 (Asset) x 威脅 (Threat) x 弱點 (Vulnerability)。如果不了解要保護什麼資產，花再多錢買設備都是徒勞。" },
                    { title: "CIA 三元素 + 1", text: "資安考試的核心支柱，缺一不可：\n• 機密性 (Confidentiality)：確保資料「不給看」。手段：加密、存取控制。\n• 完整性 (Integrity)：確保資料「不被改」。手段：雜湊 (Hashing)、數位簽章。\n• 可用性 (Availability)：確保資料「隨時用」。手段：備援、備份、防 DDoS。\n• 加分題 - 不可否認性 (Non-repudiation)：做過的事不能抵賴，通常透過數位簽章達成。" },
                    { title: "縱深防禦 (Defense in Depth) 架構", text: "單點防禦一定會失敗，必須像剝洋蔥一樣建立多層防禦：\n1. 實體層：警衛、門禁卡、監視器。\n2. 網路層：防火牆、VPN、入侵防禦系統 (IPS)。\n3. 主機層：作業系統更新、防毒軟體。\n4. 應用層：輸入驗證、程式碼掃描。\n5. 資料層：檔案加密、資料庫權限控管。" }
                ],
                quiz: [
                    { q: "關於風險的組成，下列公式何者最為正確？", options: ["風險 = 防火牆數量 x 預算", "風險 = 資產 x 威脅 x 弱點", "風險 = 員工數 x 電腦數"], ans: 1 },
                    { q: "使用者宣稱他沒有傳送某封電子郵件，但數位簽章證明是他發的。這涉及到資安的什麼特性？", options: ["機密性", "可用性", "不可否認性"], ans: 2 }
                ]
            },
            {
                day: 2,
                module: "第一篇：資訊安全認知與風險識別",
                title: "法律規範與事件處理",
                icon: BookOpen,
                content: [
                    { title: "電腦犯罪與刑法", text: "常見的電腦犯罪類型：\n• 妨害電腦使用罪 (刑法 358-362條)：無故輸入他人帳密入侵電腦、無故取得刪除變更電磁紀錄、利用程式干擾電腦運作 (如 DDoS)。\n• 詐欺罪：利用電腦設備詐欺 (如修改銀行餘額)。" },
                    { title: "個人資料保護法 (PDPA) 深究", text: "企業在處理個資時的黃金原則：\n1. 目的特定：不能說「為了未來可能用到」就先蒐集。\n2. 告知義務：必須告訴當事人你蒐集什麼、用多久、誰會用。\n3. 最小化原則：只需蒐集達成目的所需的「最少」資料。\n\n當發生個資外洩時，企業有義務在查明後通知當事人。" },
                    { title: "資安事件處理 (Incident Response) 與鑑識", text: "當發生駭客入侵，處理流程至關重要：\n1. 準備 (Preparation)：平時就要備份、演練。\n2. 偵測與分析 (Detection)：確認這是不是真的攻擊？範圍多大？\n3. 圍堵、根除與復原 (Containment, Eradication, Recovery)：這是重點。發現中毒第一件事通常是「拔網路線 (隔離)」，保留記憶體證據 (鑑識)，清除病毒後再復原備份。\n4. 檢討 (Lessons Learned)：PDCA 的 Act，修正漏洞。" }

                    { q: "當發現伺服器正在被駭客竊取資料，第一步標準應變動作通常是什麼？", options: ["立即格式化硬碟", "切斷網路連線進行隔離", "打電話報警"], ans: 1 },
                    { q: "無故取得、刪除或變更他人電腦或相關設備之電磁紀錄，觸犯了什麼罪？", options: ["毀損罪", "妨害電腦使用罪", "竊盜罪"], ans: 1 }
                ]
            },
            {
                day: 3,
                module: "第一篇：資訊安全認知與風險識別",
                title: "常見攻擊手法解析",
                icon: AlertCircle,
                content: [
                    { title: "社交工程 (Social Engineering) 全貌", text: "攻擊「人」比攻擊系統容易。常見手法：\n• Phishing (網路釣魚)：偽造 Email 或網站。\n• Vishing (語音釣魚)：假冒電話 (如假客服、假檢警)。\n• Smishing (簡訊釣魚)：假冒快遞簽收簡訊。\n• Pretexting (假託)：編造一個情境 (劇本) 來騙取信任。" },
                    { title: "偽裝與攔截", text: "• IP Spoofing (IP 偽造)：將封包的來源 IP 改成信任的內部 IP，以繞過防火牆。\n• Email Spoofing：修改寄件人欄位。\n• 中間人攻擊 (MitM)：攻擊者偷偷介入通訊雙方之間 (如在免費 Wi-Fi 竊聽)，雙方以為在私聊，其實都被監聽。" },
                    { title: "後門與緩衝區溢位", text: "• 後門 (Backdoor)：程式開發者留下的除錯通道，或駭客植入的秘密入口。\n• 緩衝區溢位 (Buffer Overflow)：向程式輸入超過其預期長度的資料，導致記憶體崩潰或執行惡意程式碼。這是許多軟體漏洞的根源。" }
                ],
                quiz: [
                    { q: "駭客利用公共 Wi-Fi 監聽你與網銀之間的傳輸內容，這屬於什麼攻擊？", options: ["中間人攻擊 (MitM)", "SQL Injection", "DDoS"], ans: 0 },
                    { q: "透過發送帶有惡意連結的簡訊來騙取個資，稱為什麼？", options: ["Phishing", "Smishing", "Vishing"], ans: 1 }
                ]
            },
            {
                day: 4,
                module: "第一篇：資訊安全認知與風險識別",
                title: "惡意程式與網路攻擊",
                icon: Shield,
                content: [
                    { title: "惡意軟體家族 (Malware)", text: "• 病毒 (Virus)：需宿主檔案，人為觸發。\n• 蠕蟲 (Worm)：獨立運作，利用漏洞自動在網路擴散 (如 WannaCry)。\n• 特洛伊木馬 (Trojan)：偽裝成正常軟體，開後門，不自我複製。\n• 間諜軟體 (Spyware)：偷偷蒐集用戶習慣、側錄鍵盤 (Keylogger)。\n• 邏輯炸彈 (Logic Bomb)：潛伏在系統中，滿足特定條件 (如時間、薪水沒入帳) 才會引爆。" },
                    { title: "殭屍網路 (Botnet)", text: "駭客透過惡意軟體控制成千上萬台電腦 (肉雞)，組成殭屍大軍。駭客 (Bot Herder) 發號施令，這些電腦就會同時攻擊同一個目標 (DDoS) 或發送垃圾郵件。" },
                    { title: "DoS 與 DDoS 攻擊原理", text: "• DoS (阻斷服務)：一對一攻擊，耗盡對方資源。\n• DDoS (分散式阻斷服務)：多對一攻擊，利用 Botnet。\n• 攻擊層次：\n  - L3/L4 攻擊：SYN Flood (發一堆半開連線請求)、UDP Flood (塞滿頻寬)。\n  - L7 攻擊：HTTP Flood (瘋狂按 F5 重新整理網頁)。" }
                ],
                quiz: [
                    { q: "哪一種惡意程式會潛伏在系統中，直到特定條件達成才發作？", options: ["蠕蟲", "邏輯炸彈", "廣告軟體"], ans: 1 },
                    { q: "大量受感染的電腦被駭客統一指揮進行攻擊，這些電腦被稱為什麼？", options: ["超級電腦", "殭屍網路 (Botnet)", "雲端伺服器"], ans: 1 }
                ]
            },
            // 第二篇
            {
                day: 5,
                module: "第二篇：信任與安全架構",
                title: "身分認證與管理架構",
                icon: User,
                content: [
                    { title: "AAA 框架詳細解析", text: "資安管理的基石：\n1. Authentication (認證)：你是誰？ (驗證 ID/密碼)\n2. Authorization (授權)：你能做什麼？ (給予讀寫權限)\n3. Accounting (紀錄/稽核)：你做了什麼？ (Log 紀錄、使用時間、流量)" },
                    { title: "生物特徵認證的指標", text: "指紋、臉部辨識雖然方便，但有誤判可能：\n• FRR (錯誤拒絕率)：你是本人但系統不讓你進 (太嚴格)。\n• FAR (錯誤接受率)：你不是本人但系統讓你進 (太寬鬆，資安大忌)。\n• CER (交錯錯誤率)：FRR 與 FAR 的交叉點，越低代表系統越準確。" },
                    { title: "零信任 (Zero Trust) 三大原則", text: "1. 顯式驗證 (Verify Explicitly)：不論來自內網外網，都要驗證。\n2. 最小權限 (Least Privilege)：只給剛好夠用的權限，不多給。\n3. 假設已遭入侵 (Assume Breach)：隨時假設駭客已經在內網了，要限制橫向移動。" }
                ],
                quiz: [
                    { q: "在生物辨識中，哪一個指標越低代表系統準確度越高？", options: ["CER", "CPU", "FPS"], ans: 0 },
                    { q: "AAA 框架中，決定使用者可以存取哪些檔案是屬於哪一項？", options: ["認證", "授權", "稽核"], ans: 1 }
                ]
            },
            {
                day: 6,
                module: "第二篇：信任與安全架構",
                title: "基礎密碼學",
                icon: Lock,
                content: [
                    { title: "密碼學演進", text: "• 凱薩密碼：位移法 (A->C)，容易被頻率分析破解。\n• 恩尼格瑪 (Enigma)：二戰德軍使用的轉子加密機，被圖靈破解。\n• 現代密碼學原則 (Kerckhoffs's principle)：系統的安全性應建立在「金鑰」的保密，而非演算法的保密 (演算法應公開受檢驗)。" },
                    { title: "對稱式加密 (Symmetric)", text: "• 原理：加解密用同一把鑰匙 (Shared Secret)。\n• 優點：速度快，適合大檔案 (硬碟加密)。\n• 缺點：金鑰交換困難、無法做數位簽章。\n• 演算法：DES (56bit，已遭破解)、3DES (過渡期)、AES (目前標準，推薦 256bit)。\n• 運作模式：ECB (不安全，相同明文產出相同密文)、CBC (較安全，引入初始向量 IV)。" }
                ],
                quiz: [
                    { q: "關於 AES 加密，下列敘述何者正確？", options: ["是非對稱式加密", "目前已被破解不建議使用", "是對稱式加密，為目前主流標準"], ans: 2 },
                    { q: "現代密碼學認為，系統的安全性應該依賴於什麼？", options: ["演算法的保密", "金鑰的保密", "電腦的運算速度"], ans: 1 }
                ]
            },
            {
                day: 7,
                module: "第二篇：信任與安全架構",
                title: "進階密碼學",

        // --- Components ---

        const MouseEffect = () => {
            useEffect(() => {
                const dot = document.getElementById("cursor-dot");
                const outline = document.getElementById("cursor-outline");

                const moveCursor = (e) => {
                    const posX = e.clientX;
                    const posY = e.clientY;

                    dot.style.left = `${posX}px`;
                    dot.style.top = `${posY}px`;

                    // Simple delay effect for outline
                    outline.animate({
                        left: `${posX}px`,
                        top: `${posY}px`
                    }, { duration: 500, fill: "forwards" });
                };

                window.addEventListener("mousemove", moveCursor);
                return () => window.removeEventListener("mousemove", moveCursor);
            }, []);
            return null; // Logic only
        };

        const ProgressBar = ({ completed, total }) => {
            const percentage = Math.round((completed / total) * 100);
            return (
                <div className="w-full mb-8">
                    <div className="flex justify-between mb-2 text-sm text-[#748B6F] font-serif font-bold">
                        <span>修煉進度</span>
                        <span>{percentage}%</span>
                    </div>
                    <div className="h-1.5 w-full bg-[#E0E0E0] rounded-full overflow-hidden">
                        <div 
                            className="h-full bg-[#748B6F] transition-all duration-1000 ease-out"
                            style={{ width: `${percentage}%` }}
                        ></div>
                    </div>
                </div>
            );
        };

        const Quiz = ({ data, onPass }) => {
            const [answers, setAnswers] = useState({});
            const [submitted, setSubmitted] = useState(false);
            const [score, setScore] = useState(0);

            const handleSelect = (qIdx, optIdx) => {
                if (submitted) return;
                setAnswers(prev => ({ ...prev, [qIdx]: optIdx }));
            };

            const handleSubmit = () => {
                let correctCount = 0;
                data.forEach((q, idx) => {
                    if (answers[idx] === q.ans) correctCount++;
                });
                setScore(correctCount);
                setSubmitted(true);
                if (correctCount === data.length) {
                    onPass();
                }
            };

            return (
                <div className="mt-8 p-6 bg-[#F9F7F2] border-t-2 border-[#E8E6DF] rounded-sm">
                    <h3 className="text-xl font-serif text-[#748B6F] mb-6 flex items-center gap-2">
                        <Feather size={20} /> 自我修煉檢測
                    </h3>
                    
                    {data.map((q, idx) => (
                        <div key={idx} className="mb-6">
                            <p className="font-medium text-[#3E3C38] mb-3">{idx + 1}. {q.q}</p>
                            <div className="space-y-2">
                                {q.options.map((opt, optIdx) => {
                                    let itemClass = "flex items-center p-3 rounded-lg border cursor-pointer transition-all ";
                                    if (submitted) {
                                        if (optIdx === q.ans) itemClass += "border-[#748B6F] bg-[#E8F5E9] text-[#2E7D32]"; // Correct
                                        else if (answers[idx] === optIdx && optIdx !== q.ans) itemClass += "border-red-300 bg-red-50 text-red-700"; // Wrong
                                        else itemClass += "border-gray-200 opacity-50";
                                    } else {
                                        itemClass += answers[idx] === optIdx 
                                            ? "border-[#748B6F] bg-[#F0F5F0]" 
                                            : "border-gray-200 hover:bg-white hover:border-gray-300";
                                    }

                                    return (
                                        <div key={optIdx} 
                                             onClick={() => handleSelect(idx, optIdx)}
                                             className={itemClass}>
                                            <div className={`w-4 h-4 rounded-full border mr-3 flex items-center justify-center
                                                ${answers[idx] === optIdx ? 'border-[#748B6F]' : 'border-gray-400'}`}>
                                                {answers[idx] === optIdx && <div className="w-2 h-2 rounded-full bg-[#748B6F]"></div>}
                                            </div>
                                            <span className="text-sm">{opt}</span>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    ))}

                        <button 
                            onClick={handleSubmit}
                            disabled={Object.keys(answers).length !== data.length}

                                ? 'bg-[#748B6F] hover:bg-[#5D7059] shadow-md' 
                                : 'bg-gray-300 cursor-not-allowed'}`}

                            提交卷軸
                        </button>

                                    <p className="font-bold text-lg mb-1">修煉成功！</p>
                                    <p className="text-sm">您已掌握今日精髓，獲得完課印章。</p>
                                </div>

                                    <p className="font-bold mb-1">修煉未成</p>
                                    <p className="text-sm">請重新複習重點後，再次挑戰 (刷新頁面重試)。</p>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [currentDay, setCurrentDay] = useState(1);
            const [completedDays, setCompletedDays] = useState([]);
            const [nicknameInput, setNicknameInput] = useState("");

            useEffect(() => {
                const savedUser = localStorage.getItem("sec_user");
                if (savedUser) {
                    const parsed = JSON.parse(savedUser);
                    setUser(parsed);
                    setCompletedDays(parsed.completedDays || []);
                    // Find first incomplete day or stay at 1
                    const nextDay = (parsed.completedDays?.length || 0) + 1;
                    setCurrentDay(nextDay > 15 ? 15 : nextDay);
                }
            }, []);

            const handleLogin = () => {
                if (!nicknameInput.trim()) return;
                const newUser = { name: nicknameInput, completedDays: [] };
                // Check if user exists in local storage logic could be here, but simpler to just overwrite or load if match
                // For this demo, let's just create session
                localStorage.setItem("sec_user", JSON.stringify(newUser));
                setUser(newUser);
            };

            const markComplete = (day) => {
                if (!completedDays.includes(day)) {
                    const newCompleted = [...completedDays, day];
                    setCompletedDays(newCompleted);
                    const updatedUser = { ...user, completedDays: newCompleted };
                    setUser(updatedUser);
                    localStorage.setItem("sec_user", JSON.stringify(updatedUser));
                }
            };

            // Calculate active content
            const activeContent = curriculumData.find(d => d.day === currentDay);

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-paper p-4">
                        <MouseEffect />
                        <div className="max-w-md w-full bg-white p-10 shadow-xl border-t-4 border-[#748B6F] rounded-sm text-center fade-in">
                            <Shield className="w-16 h-16 text-[#748B6F] mx-auto mb-6" strokeWidth={1.5} />
                            <h1 className="text-3xl font-serif font-bold text-[#3E3C38] mb-2">資安新手村</h1>
                            <p className="text-gray-500 mb-8 font-serif italic">十五日修煉．從零打造防禦壁壘</p>
                            
                            <div className="space-y-4">
                                <input 
                                    type="text" 
                                    placeholder="請留下您的修煉代號 (暱稱)" 
                                    className="w-full p-3 border-b-2 border-gray-200 focus:border-[#748B6F] outline-none bg-transparent text-center text-lg transition-colors placeholder:text-gray-300"
                                    value={nicknameInput}
                                    onChange={(e) => setNicknameInput(e.target.value)}
                                />
                                <button 
                                    onClick={handleLogin}
                                    className="w-full bg-[#3E3C38] text-[#F2F0E9] py-3 rounded hover:bg-[#5C5A55] transition-colors font-serif tracking-widest"
                                >
                                    開啟卷軸
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#F2F0E9]">
                    <MouseEffect />
                    
                    {/* Sidebar / Navigation */}
                    <aside className="w-full md:w-80 bg-[#EBE9E1] border-r border-[#D1CDC0] flex flex-col h-screen sticky top-0 overflow-y-auto">
                        <div className="p-8 border-b border-[#D1CDC0]">
                            <h2 className="text-2xl font-serif font-bold text-[#3E3C38] mb-2">資安修煉錄</h2>
                            <div className="flex items-center text-sm text-gray-500 gap-2 mb-4">
                                <User size={14} /> <span>{user.name}</span>
                            </div>
                            <ProgressBar completed={completedDays.length} total={15} />
                        </div>
                        
                        <div className="flex-1 py-4">
                            {curriculumData.map((item) => {
                                const isCompleted = completedDays.includes(item.day);
                                const isActive = currentDay === item.day;
                                const isLocked = !isCompleted && item.day > (Math.max(...completedDays, 0) + 1);

                                return (
                                    <div 
                                        key={item.day}
                                        onClick={() => !isLocked && setCurrentDay(item.day)}
                                        className={`px-6 py-4 cursor-pointer flex items-center justify-between transition-all border-b border-transparent hover:bg-[#E0DED5]
                                            ${isActive ? 'bg-[#FFFCF5] border-l-4 border-l-[#748B6F] shadow-sm' : ''}
                                            ${isLocked ? 'opacity-40 cursor-not-allowed' : ''}
                                        `}
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-serif
                                                ${isCompleted ? 'bg-[#748B6F] text-white' : isActive ? 'bg-[#3E3C38] text-white' : 'bg-[#D1CDC0] text-gray-600'}
                                            `}>
                                                {isCompleted ? <CheckCircle size={14} /> : item.day}
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="text-[10px] uppercase tracking-wider text-gray-400 font-serif">Day {item.day}</span>
                                                <span className={`text-sm font-medium ${isActive ? 'text-[#3E3C38]' : 'text-gray-600'}`}>{item.title}</span>
                                            </div>
                                        </div>
                                        {isLocked && <Lock size={14} className="text-gray-400" />}
                                    </div>
                                );
                            })}
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto bg-paper relative">
                        <div className="max-w-3xl mx-auto p-8 md:p-16 min-h-screen flex flex-col">
                            
                            {/* Header */}
                            <header className="mb-12 text-center border-b pb-8 border-gray-200">
                                <span className="inline-block px-3 py-1 bg-[#F0F5F0] text-[#748B6F] text-xs tracking-widest rounded-full mb-4 font-serif">
                                    {activeContent.module}
                                </span>
                                <h1 className="text-4xl md:text-5xl font-serif text-[#3E3C38] mb-6 leading-tight">
                                    {activeContent.title}
                                </h1>
                                <div className="flex justify-center items-center gap-2 text-gray-400">
                                    <activeContent.icon size={20} strokeWidth={1.5} />
                                    <span className="text-sm font-serif italic">Day {activeContent.day}</span>
                                </div>
                            </header>

                            {/* Content Body */}
                            <div className="flex-1 space-y-12">
                                {activeContent.content.map((block, idx) => (
                                    <section key={idx} className="group">
                                        <h3 className="text-xl font-serif font-bold text-[#3E3C38] mb-4 pl-4 border-l-2 border-[#D2B48C] group-hover:border-[#748B6F] transition-colors">
                                            {block.title}
                                        </h3>
                                        <p className="text-gray-600 leading-8 text-justify whitespace-pre-line">
                                            {block.text}
                                        </p>
                                    </section>
                                ))}
                            </div>

                            {/* Quiz / Completion */}
                            <div className="mt-16">
                                {completedDays.includes(activeContent.day) ? (
                                    <div className="p-8 bg-[#F0F5F0] border border-[#748B6F] rounded-lg text-center relative overflow-hidden">
                                        <div className="absolute -right-4 -bottom-4 opacity-10 text-[#748B6F]">
                                            <Award size={120} />
                                        </div>
                                        <h3 className="text-2xl font-serif text-[#2E7D32] mb-2 flex items-center justify-center gap-2">
                                            <Award /> 修煉完成
                                        </h3>
                                        <p className="text-gray-600 mb-6">您已通過本日的試煉。</p>
                                        {activeContent.day < 15 && (
                                            <button 
                                                onClick={() => setCurrentDay(activeContent.day + 1)}
                                                className="px-6 py-2 bg-[#748B6F] text-white rounded hover:bg-[#5D7059] transition-colors flex items-center gap-2 mx-auto"
                                            >
                                                進入下一章 <ChevronRight size={16} />
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <Quiz 
                                        data={activeContent.quiz} 
                                        onPass={() => markComplete(activeContent.day)} 
                                    />
                                )}
                            </div>
                            
                            {/* Footer decoration */}
                            <div className="mt-20 text-center">
                                <div className="inline-block w-2 h-2 rounded-full bg-[#D1CDC0] mx-1"></div>
                                <div className="inline-block w-2 h-2 rounded-full bg-[#D1CDC0] mx-1"></div>
                                <div className="inline-block w-2 h-2 rounded-full bg-[#D1CDC0] mx-1"></div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
