<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>方格子記帳本</title>
  
  <link rel="icon" type="image/png" href="greengridwithText.png">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@600;700;800;900&display=swap');
    
    :root {
      --bg-base: #F0F7EB;
      --bg-grid: rgba(162, 212, 137, 0.25);
      --accent-primary: #A888F9;
      --accent-dark: #7D5AE0;
      --accent-light: #EAE1FB;
      --accent-muted: #C7B5F8;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg-base);
      min-height: 100vh;
      color: #4A4A4A;
      margin: 0;
      overflow-x: hidden;
      transition: background-color 0.5s ease;
    }

    .font-num {
      font-family: 'Nunito', sans-serif;
    }

    .bg-gingham {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: var(--bg-base);
      background-image:
        linear-gradient(90deg, var(--bg-grid) 50%, transparent 50%),
        linear-gradient(var(--bg-grid) 50%, transparent 50%);
      background-size: 32px 32px;
      transition: background-color 0.5s ease;
    }

    .daisy {
      position: fixed;
      width: 26px;
      height: 26px;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23FFF'%3E%3Ccircle cx='12' cy='5' r='4'/%3E%3Ccircle cx='12' cy='19' r='4'/%3E%3Ccircle cx='5' cy='12' r='4'/%3E%3Ccircle cx='19' cy='12' r='4'/%3E%3Ccircle cx='7' cy='7' r='4'/%3E%3Ccircle cx='17' cy='17' r='4'/%3E%3Ccircle cx='17' cy='7' r='4'/%3E%3Ccircle cx='7' cy='17' r='4'/%3E%3C/g%3E%3Ccircle cx='12' cy='12' r='4.5' fill='%23F5C249'/%3E%3C/svg%3E");
      background-size: contain;
      background-repeat: no-repeat;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06));
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .view-section {
      display: none;
      animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .view-section.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px) scale(0.98); }
      to { opacity: 1; transform: translateY(0); scale(1); }
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* 開場動畫專屬樣式 */
    .splash-daisy {
      width: 28px;
      height: 28px;
      background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23FFF'%3E%3Ccircle cx='12' cy='5' r='4'/%3E%3Ccircle cx='12' cy='19' r='4'/%3E%3Ccircle cx='5' cy='12' r='4'/%3E%3Ccircle cx='19' cy='12' r='4'/%3E%3Ccircle cx='7' cy='7' r='4'/%3E%3Ccircle cx='17' cy='17' r='4'/%3E%3Ccircle cx='17' cy='7' r='4'/%3E%3Ccircle cx='7' cy='17' r='4'/%3E%3C/g%3E%3Ccircle cx='12' cy='12' r='4.5' fill='%23F5C249'/%3E%3C/svg%3E");
      background-size: contain;
      background-repeat: no-repeat;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
    }

    .splash-logo { opacity: 0; transform: scale(0.8); animation: splashFadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.2s; }
    .splash-pop-1 { opacity: 0; animation: splashPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; animation-delay: 0.5s; }
    .splash-pop-2 { opacity: 0; animation: splashPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; animation-delay: 0.7s; }
    .splash-pop-3 { opacity: 0; animation: splashPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; animation-delay: 0.6s; }
    .splash-pop-4 { opacity: 0; animation: splashPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; animation-delay: 0.8s; }
    .splash-title { opacity: 0; animation: splashFadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 1.0s; }
    .splash-subtitle { opacity: 0; animation: splashFadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 1.2s; }
    .splash-slogan-box { opacity: 0; animation: splashFadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 1.5s; }

    @keyframes splashPop {
      0% { opacity: 0; transform: scale(0); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes splashFadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="pb-36 relative overflow-x-hidden transition-colors duration-500">

  <!-- ==================== ✨ 開場動畫 (Splash Screen) ==================== -->
  <div id="splash-screen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center transition-opacity duration-700 bg-[var(--bg-base)]">
    <div class="bg-gingham opacity-90"></div>
    <div class="relative z-10 flex flex-col items-center">
      <div class="relative mb-6">
        <div class="absolute -top-4 -left-6 rotate-12 scale-110 z-20"><div class="splash-daisy splash-pop-1"></div></div>
        <div class="absolute top-2 -right-8 -rotate-12 scale-75 z-20"><div class="splash-daisy splash-pop-2"></div></div>
        <div class="absolute -bottom-6 -right-2 rotate-45 scale-125 z-0"><div class="splash-daisy splash-pop-3"></div></div>
        <div class="absolute -bottom-2 -left-8 rotate-[20deg] scale-90 z-20"><div class="splash-daisy splash-pop-4"></div></div>

        <div class="w-24 h-24 bg-white/70 backdrop-blur-xl rounded-[28px] border-[3px] border-white shadow-[0_10px_40px_rgba(0,0,0,0.08)] flex items-center justify-center splash-logo relative z-10">
          <i data-lucide="wallet" class="w-10 h-10 text-[var(--accent-primary)]"></i>
        </div>
      </div>

      <h1 class="text-3xl font-black text-[#4A4A4A] tracking-widest splash-title">方格子記帳本</h1>
      <p class="text-[13px] font-bold text-[var(--accent-primary)] font-num tracking-[0.25em] mt-2 splash-subtitle">GINGHAM WALLET</p>
    </div>

    <div class="absolute bottom-16 flex flex-col items-center z-10 splash-slogan-box w-full">
      <p class="text-[15px] font-bold text-[#5A5A5A] tracking-[0.25em] mb-1.5 ml-1">方寸之間・記錄生活</p>
      <p class="text-[10px] font-bold text-[#AFAFAF] tracking-widest uppercase font-num">Track your life, simply.</p>
    </div>
  </div>

  <!-- 全局提示框 (Toast) -->
  <div id="toast-message" class="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-white/90 backdrop-blur-md text-[#4A4A4A] border border-[#F0F0F0] shadow-[0_8px_30px_rgba(0,0,0,0.08)] px-6 py-3 rounded-full transition-all duration-300 transform -translate-y-20 opacity-0 font-bold text-[13px] flex items-center gap-2 pointer-events-none">
  </div>

  <!-- 背景底圖 -->
  <div class="bg-gingham"></div>
  <div class="daisy top-[12%] right-[15%] rotate-12 scale-110"></div>
  <div class="daisy top-[35%] left-[8%] -rotate-12 scale-90 opacity-90"></div>
  <div class="daisy top-[60%] right-[10%] rotate-45 scale-75 opacity-80"></div>
  <div class="daisy bottom-[20%] left-[12%] rotate-12 scale-100"></div>
  <div class="daisy top-[6%] left-[30%] rotate-[20deg] scale-[0.65] opacity-70"></div>

  <div id="app-container" class="relative z-10 min-h-screen max-w-md mx-auto">
    
    <!-- ==================== 首頁視圖 ==================== -->
    <div id="view-home" class="view-section active p-6 space-y-8 pb-32">
      <header class="pt-8 relative">
        <button onclick="openSearchModal()" class="absolute right-2 top-8 w-10 h-10 bg-white/60 backdrop-blur-md rounded-full flex items-center justify-center text-[#AFAFAF] shadow-sm hover:text-[var(--accent-primary)] transition-colors border border-white z-20">
          <i data-lucide="search" class="w-5 h-5"></i>
        </button>

        <div class="text-center mb-8 relative px-2">
          <div class="absolute left-[10%] top-[10%] w-40 h-40 bg-[var(--accent-primary)] opacity-10 rounded-full mix-blend-multiply filter blur-3xl z-0 pointer-events-none transition-colors"></div>
          <div class="absolute right-[10%] bottom-[10%] w-40 h-40 bg-[var(--accent-muted)] opacity-10 rounded-full mix-blend-multiply filter blur-3xl z-0 pointer-events-none transition-colors"></div>
          
          <div class="relative z-10 flex flex-col items-center">
            <div class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-md px-4 py-1.5 rounded-full mb-6 border border-white shadow-sm">
              <i data-lucide="sun" class="w-3.5 h-3.5 text-[#F5C249]"></i>
              <p id="home-date" class="text-xs font-bold text-[#AFAFAF] font-num tracking-wider"></p>
            </div>
            
            <div class="flex items-center justify-center gap-1.5 mb-2 text-[#7A7A7A] bg-white/60 backdrop-blur-md px-3 py-1 rounded-full border border-white shadow-sm">
               <i data-lucide="wallet" class="w-[14px] h-[14px]"></i>
               <span class="text-[12px] font-bold tracking-widest">本月結餘</span>
            </div>
            <h2 id="home-balance" class="font-num text-[56px] font-black text-[#4A4A4A] tracking-tighter mb-8 drop-shadow-sm leading-none">$0</h2>
            
            <div class="flex w-full max-w-[320px] mx-auto justify-between gap-3">
              <div class="flex-1 flex items-center gap-3 bg-white/60 backdrop-blur-sm border border-white/80 p-3 rounded-[24px] shadow-[0_4px_15px_rgba(0,0,0,0.02)]">
                <div class="w-[34px] h-[34px] rounded-full bg-[#E4F9E9] flex items-center justify-center shrink-0">
                  <i data-lucide="arrow-down-left" class="w-[18px] h-[18px] text-[#83BA61] stroke-[2.5]"></i>
                </div>
                <div class="text-left flex-1 overflow-hidden">
                  <p class="text-[10px] text-[#AFAFAF] font-bold tracking-widest mb-0.5">收入</p>
                  <p id="home-income" class="font-num font-bold text-[#83BA61] text-[15px] truncate">$0</p>
                </div>
              </div>
              <div class="flex-1 flex items-center gap-3 bg-white/60 backdrop-blur-sm border border-white/80 p-3 rounded-[24px] shadow-[0_4px_15px_rgba(0,0,0,0.02)]">
                <div class="w-[34px] h-[34px] rounded-full bg-[#FFE4DE] flex items-center justify-center shrink-0">
                  <i data-lucide="arrow-up-right" class="w-[18px] h-[18px] text-[#FF8B8B] stroke-[2.5]"></i>
                </div>
                <div class="text-left flex-1 overflow-hidden">
                  <p class="text-[10px] text-[#AFAFAF] font-bold tracking-widest mb-0.5">支出</p>
                  <p id="home-expense" class="font-num font-bold text-[#FF8B8B] text-[15px] truncate">$0</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div>
        <div class="inline-flex items-center gap-1.5 mb-4 ml-1 bg-white/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-white shadow-sm">
           <i data-lucide="clock" class="w-[14px] h-[14px] text-[var(--accent-primary)]"></i>
           <h3 class="text-[12px] font-bold text-[#7A7A7A] tracking-widest leading-none mt-[1px]">近期紀錄</h3>
        </div>
        <div id="home-transactions" class="space-y-6"></div>
      </div>
    </div>

    <!-- ==================== 月曆視圖 ==================== -->
    <div id="view-calendar" class="view-section p-6 h-full pb-32">
      <header class="flex justify-between items-center mb-6 pt-8 px-2">
        <h2 class="text-[22px] font-bold text-[#4A4A4A]">月曆</h2>
        <div class="flex items-center gap-2 bg-white/60 backdrop-blur-md p-1 rounded-2xl border border-white">
          <button onclick="prevMonth()" class="p-1.5 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
          <div class="px-2">
            <span id="calendar-month-display" class="font-num font-bold text-[var(--accent-dark)] text-sm tracking-wide"></span>
          </div>
          <button onclick="nextMonth()" class="p-1.5 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>
      </header>

      <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0] pb-8">
        <div class="grid grid-cols-7 gap-y-6 text-center" id="calendar-grid"></div>
      </div>
    </div>

    <!-- ==================== 分析視圖 ==================== -->
    <div id="view-chart" class="view-section p-6 pb-32">
      <header class="flex flex-col mb-6 pt-8 px-2 gap-4">
        <div class="flex justify-between items-center">
          <h2 class="text-[22px] font-bold text-[#4A4A4A]">分析</h2>
          <div class="bg-white/60 backdrop-blur-md p-1 rounded-full border border-white flex text-[13px] font-bold text-[#AFAFAF] shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
            <button onclick="setChartMode('day')" id="btn-mode-day" class="px-3.5 py-1.5 rounded-full transition-colors border border-transparent">日</button>
            <button onclick="setChartMode('week')" id="btn-mode-week" class="px-3.5 py-1.5 rounded-full transition-colors border border-transparent">週</button>
            <button onclick="setChartMode('month')" id="btn-mode-month" class="px-3.5 py-1.5 rounded-full transition-colors bg-white text-[var(--accent-dark)] shadow-sm border border-[#F0F0F0]">月</button>
            <button onclick="setChartMode('year')" id="btn-mode-year" class="px-3.5 py-1.5 rounded-full transition-colors border border-transparent">年</button>
          </div>
        </div>
        <div class="flex items-center justify-between bg-white/60 backdrop-blur-md p-1.5 rounded-[20px] border border-white shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
          <button onclick="prevChartPeriod()" class="p-2 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
          <div class="px-2">
            <span id="chart-period-display" class="font-num font-bold text-[var(--accent-dark)] text-[15px] tracking-wide"></span>
          </div>
          <button onclick="nextChartPeriod()" class="p-2 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>
      </header>

      <div class="bg-white rounded-[32px] p-8 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0] flex flex-col items-center mb-6">
        <div class="bg-[#F0F0F0]/80 p-1 rounded-full flex font-bold text-sm shadow-inner backdrop-blur-sm mb-4 w-full max-w-[200px] mx-auto">
          <button id="chart-tab-expense" onclick="setChartType('expense')" class="flex-1 py-1.5 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]">支出</button>
          <button id="chart-tab-income" onclick="setChartType('income')" class="flex-1 py-1.5 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent">收入</button>
        </div>

        <div id="chart-dimension-tabs" class="flex gap-2 justify-center mb-8 w-full max-w-[260px] mx-auto transition-all duration-300">
          <button id="dim-tab-category" onclick="setChartDimension('category')" class="flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all bg-[var(--accent-light)] text-[var(--accent-dark)] shadow-sm">分類</button>
          <button id="dim-tab-payment" onclick="setChartDimension('payment')" class="flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all text-[#AFAFAF] hover:bg-[#F8F9FA]">付款</button>
          <button id="dim-tab-consumption" onclick="setChartDimension('consumption')" class="flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all text-[#AFAFAF] hover:bg-[#F8F9FA]">消費類型</button>
        </div>

        <div id="chart-donut" class="w-48 h-48 rounded-full relative mb-10 transition-transform duration-700 hover:scale-105 flex items-center justify-center">
          <div class="absolute inset-4 bg-white rounded-full flex flex-col items-center justify-center shadow-[0_4px_20px_rgba(0,0,0,0.04)] z-10">
            <span id="chart-center-label" class="text-[11px] text-[#AFAFAF] font-bold mb-0.5 tracking-widest">總支出</span>
            <span id="chart-total" class="font-num text-2xl font-black text-[#5A5A5A]">$0</span>
          </div>
          <div id="chart-empty" class="hidden absolute inset-0 rounded-full border-[4px] border-dashed border-[#F4F5F7] flex items-center justify-center z-20 bg-white">
            <span class="text-[#AFAFAF] font-bold text-sm">無資料</span>
          </div>
        </div>

        <div id="chart-list" class="w-full space-y-5"></div>
      </div>

      <!-- 趨勢分析長條圖 -->
      <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0] mb-6">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-[15px] font-bold text-[#4A4A4A] flex items-center gap-2">
            <i data-lucide="bar-chart-3" class="w-4 h-4 text-[var(--accent-primary)]"></i> 收支趨勢
          </h3>
          <div class="bg-[#F8F9FA] p-1 rounded-full flex text-[11px] font-bold text-[#AFAFAF]">
            <button id="btn-trend-week" onclick="setTrendMode('week')" class="px-3 py-1 rounded-full transition-colors border border-transparent">週</button>
            <button id="btn-trend-month" onclick="setTrendMode('month')" class="px-3 py-1 rounded-full transition-colors border border-transparent">月</button>
            <button id="btn-trend-year" onclick="setTrendMode('year')" class="px-3 py-1 rounded-full transition-colors bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]">年</button>
          </div>
        </div>
        
        <div class="relative h-40 flex items-end justify-between gap-1 mt-6 border-b border-[#F0F0F0] pb-2" id="trend-chart-bars"></div>
        <div class="flex justify-between mt-2 text-[10px] text-[#AFAFAF] font-bold font-num px-1" id="trend-chart-labels"></div>
      </div>
    </div>

    <!-- ==================== 設定與主題視圖 ==================== -->
    <div id="view-settings" class="view-section p-6 pb-32">
      <header class="flex justify-between items-center mb-8 pt-8 px-2">
        <h2 class="text-[22px] font-bold text-[#4A4A4A]">設定與自訂</h2>
      </header>

      <div class="space-y-6">
        <!-- 桌布樣式 -->
        <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0]">
          <h3 class="text-[13px] font-bold text-[#AFAFAF] mb-5 tracking-widest flex items-center gap-2">
            <i data-lucide="image" class="w-4 h-4"></i> 桌布樣式
          </h3>
          <div class="grid grid-cols-5 gap-y-4 gap-x-2" id="wallpaper-options">
          </div>
        </div>

        <!-- 文字配色 -->
        <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0]">
          <h3 class="text-[13px] font-bold text-[#AFAFAF] mb-5 tracking-widest flex items-center gap-2">
            <i data-lucide="palette" class="w-4 h-4"></i> 主題配色
          </h3>
          <div class="grid grid-cols-5 gap-y-4 gap-x-2" id="accent-options">
          </div>
        </div>

        <!-- 自訂分類與次分類管理區塊 -->
        <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0]">
          <h3 class="text-[13px] font-bold text-[#AFAFAF] mb-5 tracking-widest flex items-center gap-2">
            <i data-lucide="tags" class="w-4 h-4"></i> 自訂分類與圖示
          </h3>
          
          <div class="flex gap-2 mb-4 bg-[#F8F9FA] p-1 rounded-full text-[12px] font-bold">
            <button id="btn-setcat-expense" onclick="switchCatSettingsTab('expense')" class="flex-1 py-1.5 rounded-full transition-colors bg-[var(--accent-light)] text-[var(--accent-dark)] shadow-sm">支出分類</button>
            <button id="btn-setcat-income" onclick="switchCatSettingsTab('income')" class="flex-1 py-1.5 rounded-full transition-colors text-[#AFAFAF] border border-transparent">收入分類</button>
          </div>

          <div id="settings-category-list" class="space-y-3 mb-5 max-h-[320px] overflow-y-auto no-scrollbar pr-1">
             <!-- 分類列表會由 JS 動態生成 -->
          </div>

          <button onclick="openCategoryModal()" class="w-full py-3.5 rounded-[20px] font-bold text-[var(--accent-primary)] bg-white border-2 border-dashed border-[var(--accent-light)] transition-all hover:bg-[var(--bg-base)] active:scale-95 flex items-center justify-center gap-2">
             <i data-lucide="plus-circle" class="w-5 h-5"></i> 新增自訂分類
          </button>
        </div>

        <!-- 資料匯出 -->

    function renderCalendar() {
      const year = currentCalendarYear; 
      const month = currentCalendarMonth; 
      
      document.getElementById('calendar-month-display').innerText = `${year}.${String(month + 1).padStart(2, '0')}`;

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const weekDays = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
      let html = '';

      weekDays.forEach(d => {
        html += `<div class="text-[11px] font-bold text-[var(--accent-muted)] mb-2 transition-colors">${d}</div>`;
      });

      for (let i = 0; i < firstDay; i++) html += `<div></div>`;

      const today = new Date();
      const todayStr = formatDateYYYYMMDD(today);

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-0${month + 1}-${String(day).padStart(2, '0')}`;
        const dayTrans = transactions.filter(t => t.date === dateStr);
        const hasData = dayTrans.length > 0;
        const isToday = (dateStr === todayStr);

        let circleClass = 'text-[#5A5A5A] font-medium';
        if (isToday) circleClass = 'bg-[var(--accent-primary)] text-white font-bold shadow-md';
        else if (hasData) circleClass = 'bg-[#white] border border-[#F0F0F0] text-[#4A4A4A] font-medium shadow-sm';

        let dotHtml = '';
        if (hasData && !isToday) {
          dotHtml = `<div class="absolute bottom-1 right-2 w-1.5 h-1.5 bg-[#D1D1D6] rounded-full"></div>`;
        } else if (hasData && isToday) {
          dotHtml = `<div class="absolute bottom-0 right-0 bg-white rounded-full p-[2px] shadow-sm"><i data-lucide="coffee" class="w-2.5 h-2.5 text-[var(--accent-primary)] transition-colors"></i></div>`;
        }

        html += `
          <div onclick="openDayDetail('${dateStr}')" class="flex flex-col items-center justify-center relative h-12 cursor-pointer font-num transition-transform hover:scale-110 active:scale-95">
            <div class="w-10 h-10 flex items-center justify-center rounded-full text-[15px] transition-colors duration-300 ${circleClass}">
              ${day}
            </div>
            ${dotHtml}
          </div>
        `;
      }
      document.getElementById('calendar-grid').innerHTML = html;
    }

    function prevMonth() {

    function getWeekRange(date) {
      const d = new Date(date.getTime());
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const start = new Date(d.setDate(diff));
      const end = new Date(start.getTime());
      end.setDate(end.getDate() + 6);
      return { start, end };
    }

    function setChartMode(mode) {
      chartMode = mode;
      ['day', 'week', 'month', 'year'].forEach(m => {
        const btn = document.getElementById(`btn-mode-${m}`);
        if (m === mode) {
          btn.className = 'px-3.5 py-1.5 rounded-full transition-colors bg-white text-[var(--accent-dark)] shadow-sm border border-[#F0F0F0]';
        } else {
          btn.className = 'px-3.5 py-1.5 rounded-full transition-colors text-[#AFAFAF] hover:text-[#4A4A4A] border border-transparent';
        }

      renderChart();

    function prevChartPeriod() {

    function nextChartPeriod() {
      if (chartMode === 'month') chartAnchorDate.setMonth(chartAnchorDate.getMonth() + 1);
      else if (chartMode === 'year') chartAnchorDate.setFullYear(chartAnchorDate.getFullYear() + 1);

    function setChartType(type) {
      chartType = type;
      const btnExp = document.getElementById('chart-tab-expense');
      const btnInc = document.getElementById('chart-tab-income');
      const dimTabs = document.getElementById('chart-dimension-tabs');
      
      if (type === 'expense') {
        btnExp.className = 'flex-1 py-1.5 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';

      }

    function setChartDimension(dim) {
      chartDimension = dim;
      ['category', 'payment', 'consumption'].forEach(d => {
        const btn = document.getElementById(`dim-tab-${d}`);
        if (d === dim) {
          btn.className = 'flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all bg-[var(--accent-light)] text-[var(--accent-dark)] shadow-sm';
        } else {
          btn.className = 'flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all text-[#AFAFAF] hover:bg-[#F8F9FA]';
        }
      });
      renderChart();
    }

    function renderChart() {
      const displayEl = document.getElementById('chart-period-display');
      let startDateStr, endDateStr;

      if (chartMode === 'month') {
        displayEl.innerText = `${chartAnchorDate.getFullYear()} . ${String(chartAnchorDate.getMonth() + 1).padStart(2, '0')}`;
      } else if (chartMode === 'year') {
        displayEl.innerText = `${chartAnchorDate.getFullYear()}`;
      } else if (chartMode === 'week') {
        const { start, end } = getWeekRange(chartAnchorDate);
        startDateStr = formatDateYYYYMMDD(start);
        endDateStr = formatDateYYYYMMDD(end);
        displayEl.innerText = `${String(start.getMonth() + 1).padStart(2, '0')}.${String(start.getDate()).padStart(2, '0')} - ${String(end.getMonth() + 1).padStart(2, '0')}.${String(end.getDate()).padStart(2, '0')}`;
      } else if (chartMode === 'day') {
        displayEl.innerText = `${chartAnchorDate.getFullYear()} . ${String(chartAnchorDate.getMonth() + 1).padStart(2, '0')} . ${String(chartAnchorDate.getDate()).padStart(2, '0')}`;
      }

      let totalExpense = 0;
      const expenses = transactions.filter(t => {
        if (t.type !== chartType) return false;
        
        if (chartMode === 'month') {
          const prefix = `${chartAnchorDate.getFullYear()}-${String(chartAnchorDate.getMonth() + 1).padStart(2, '0')}`;
          return t.date.startsWith(prefix);
        } else if (chartMode === 'year') {
          const prefix = `${chartAnchorDate.getFullYear()}`;
          return t.date.startsWith(prefix);
        } else if (chartMode === 'week') {
          return t.date >= startDateStr && t.date <= endDateStr;
        } else if (chartMode === 'day') {
          return t.date === formatDateYYYYMMDD(chartAnchorDate);
        }
        return false;
      });
      
      const grouped = expenses.reduce((acc, t) => {
        totalExpense += t.amount;
        
        let groupName, groupIcon, groupColor;

        if (chartType === 'income' || chartDimension === 'category') {
          groupName = t.category;
          groupIcon = t.icon;
          groupColor = t.color;
        } else if (chartDimension === 'payment') {
          groupName = (t.paymentMethod === '電子支付' && t.ePayMethod) ? t.ePayMethod : (t.paymentMethod || '未指定');
          groupIcon = CHART_META.payment[t.paymentMethod]?.icon || 'help-circle';
          groupColor = CHART_META.payment[t.paymentMethod]?.color || '#F5F5F5';
        } else if (chartDimension === 'consumption') {
          groupName = t.consumptionType || '未指定';
          groupIcon = CHART_META.consumption[t.consumptionType]?.icon || 'help-circle';
          groupColor = CHART_META.consumption[t.consumptionType]?.color || '#F5F5F5';
        }

        const existing = acc.find(c => c.name === groupName);
        if (existing) existing.amount += t.amount;
        else acc.push({ name: groupName, amount: t.amount, color: groupColor, icon: groupIcon });
        return acc;
      }, []);
      
      grouped.sort((a, b) => b.amount - a.amount);

      document.getElementById('chart-total').innerText = `$${formatMoney(totalExpense)}`;
      const donut = document.getElementById('chart-donut');
      const emptyState = document.getElementById('chart-empty');

      if (totalExpense > 0) {
        emptyState.classList.add('hidden');
        let cumulativePercent = 0;
        const gradientStops = grouped.map(item => {
          const percent = (item.amount / totalExpense) * 100;
          const start = cumulativePercent;
          const end = cumulativePercent + percent;
          cumulativePercent = end;
          return `${item.color} ${start}% ${end}%`;
        }).join(', ');
        donut.style.background = `conic-gradient(${gradientStops})`;
      } else {
        emptyState.classList.remove('hidden');
        donut.style.background = 'transparent';
      }

      const listContainer = document.getElementById('chart-list');
      listContainer.innerHTML = grouped.map(item => {
        const percent = ((item.amount / totalExpense) * 100).toFixed(1);
        return `
          <div class="flex items-center justify-between group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background-color: ${item.color}">
                 <i data-lucide="${item.icon}" class="w-5 h-5 text-[#7A7A7A] stroke-[1.5]"></i>
              </div>
              <span class="text-[#4A4A4A] font-bold text-[15px]">${item.name}</span>
            </div>
            <div class="flex items-center gap-4">
              <span class="text-[#D1D1D6] font-num text-sm font-bold w-10 text-right">${percent}%</span>
              <span class="font-bold text-[#5A5A5A] font-num text-lg w-16 text-right">$${formatMoney(item.amount)}</span>
            </div>
          </div>
        `;
      }).join('');
      
      lucide.createIcons();
      renderTrendChart();
    }

    let trendMode = 'year'; 

    function setTrendMode(mode) {
      trendMode = mode;
      ['week', 'month', 'year'].forEach(m => {
        const btn = document.getElementById(`btn-trend-${m}`);
        if (m === mode) {
          btn.className = 'px-3 py-1 rounded-full transition-colors bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';
        } else {
          btn.className = 'px-3 py-1 rounded-full transition-colors text-[#AFAFAF] hover:text-[#4A4A4A] border border-transparent';
        }
      });
      renderTrendChart();
    }

    function renderTrendChart() {
      const barsContainer = document.getElementById('trend-chart-bars');
      const labelsContainer = document.getElementById('trend-chart-labels');
      
      if (!barsContainer || !labelsContainer) return;

      const year = chartAnchorDate.getFullYear();
      const month = chartAnchorDate.getMonth();
      let dataPoints = []; 
      
      if (trendMode === 'week') {
        const { start } = getWeekRange(chartAnchorDate);
        for (let i = 0; i < 7; i++) {
          const d = new Date(start);
          d.setDate(start.getDate() + i);
          const dateStr = formatDateYYYYMMDD(d);
          const sum = transactions.filter(t => t.type === chartType && t.date === dateStr).reduce((a, b) => a + b.amount, 0);
          const days = ['日', '一', '二', '三', '四', '五', '六'];
          dataPoints.push({ label: days[i], amount: sum });
        }
      } else if (trendMode === 'month') {
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        for (let i = 1; i <= daysInMonth; i++) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
          const sum = transactions.filter(t => t.type === chartType && t.date === dateStr).reduce((a, b) => a + b.amount, 0);
          dataPoints.push({ label: String(i), amount: sum });
        }
      } else if (trendMode === 'year') {
        for (let i = 1; i <= 12; i++) {
          const prefix = `${year}-${String(i).padStart(2, '0')}`;
          const sum = transactions.filter(t => t.type === chartType && t.date.startsWith(prefix)).reduce((a, b) => a + b.amount, 0);
          dataPoints.push({ label: `${i}月`, amount: sum });
        }
      }

      const maxAmount = Math.max(...dataPoints.map(d => d.amount), 1); 

      barsContainer.innerHTML = '';
      labelsContainer.innerHTML = '';

      dataPoints.forEach((dp, index) => {
        const heightPct = (dp.amount / maxAmount) * 100;
        
        const barWrapper = document.createElement('div');
        barWrapper.className = 'flex-1 flex flex-col justify-end items-center group relative h-full w-full';
        
        const bar = document.createElement('div');
        if (dp.amount > 0) {
            bar.className = 'w-full max-w-[14px] bg-[var(--accent-light)] rounded-t-md transition-all duration-300 group-hover:bg-[var(--accent-primary)] relative cursor-pointer';
            bar.style.height = `${Math.max(heightPct, 3)}%`; 
            
            const tooltip = document.createElement('div');
            tooltip.className = 'absolute -top-8 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity bg-[#4A4A4A] text-white text-[10px] py-1 px-2 rounded-md pointer-events-none whitespace-nowrap z-10 shadow-md font-num';
            tooltip.innerText = `$${formatMoney(dp.amount)}`;
            bar.appendChild(tooltip);
        } else {
            bar.className = 'w-full max-w-[14px] bg-transparent rounded-t-md';
            bar.style.height = '0%';
        }

        barWrapper.appendChild(bar);
        barsContainer.appendChild(barWrapper);

        const label = document.createElement('div');
        label.className = 'flex-1 flex justify-center relative w-full h-4';
        
        if (trendMode === 'month') {
          if (index === 0 || index === 9 || index === 19 || index === dataPoints.length - 1) {
             label.innerHTML = `<span class="absolute whitespace-nowrap">${dp.label}日</span>`;
          }
        } else {
          label.innerHTML = `<span class="absolute whitespace-nowrap">${dp.label}</span>`;
        }
        labelsContainer.appendChild(label);
      });
      
      lucide.createIcons();
    }

    function saveCategoryConfig() {
        const newName = document.getElementById('cat-input-name').value.trim();
        if (!newName) return showToast('請輸入分類名稱！', true);
        if (!tempCatSubcategories.includes('其他')) tempCatSubcategories.push('其他');

        const newCat = {
            id: editingCatId || 'c_' + Date.now(),
            name: newName,
            icon: tempCatIcon,
            color: tempCatColor,
            subcategories: tempCatSubcategories
        };

        if (catSettingsTab === 'expense') {
            if (editingCatId) {
                expenseCats = expenseCats.map(c => c.id === editingCatId ? newCat : c);
            } else {
                expenseCats.push(newCat);
            }
            localStorage.setItem('gg_expense_cats', JSON.stringify(expenseCats));
        } else {
            if (editingCatId) {
                incomeCats = incomeCats.map(c => c.id === editingCatId ? newCat : c);

            localStorage.setItem('gg_income_cats', JSON.stringify(incomeCats));

          <div class="flex flex-wrap gap-2 pb-1 px-1">
            ${PAYMENT_METHODS.map(m => `
              <button type="button" onclick="selectPayment('${m}')" class="shrink-0 px-3.5 py-1.5 rounded-full text-[12px] font-bold transition-colors ${selectedPayment === m ? 'bg-white shadow-sm border border-[var(--accent-light)] text-[var(--accent-dark)]' : 'text-[#AFAFAF] border border-transparent hover:bg-white/50'}">${m}</button>
            `).join('')}
          </div>
        </div>
      `;

      if (selectedPayment === '電子支付') {
        html += `
          <div class="animate-in fade-in slide-in-from-top-1 duration-200 pl-1">
            <div class="flex flex-wrap gap-1.5 px-1 bg-white/40 p-2 rounded-[16px] border border-white/50 shadow-inner">
              ${EPAY_METHODS.map(m => `
                <button type="button" onclick="selectEPay('${m}')" class="px-2.5 py-1.5 rounded-full text-[11px] font-bold transition-colors ${selectedEPay === m ? 'bg-[var(--accent-light)] text-[var(--accent-dark)] shadow-sm' : 'text-[#AFAFAF] hover:bg-white'}">${m}</button>
              `).join('')}
            </div>
          </div>
        `;
      }

      html += `
        <div>
          <h3 class="text-[10px] font-bold text-[#AFAFAF] mb-2 ml-2 tracking-widest uppercase">消費類型</h3>
          <div class="flex gap-2 px-1">
            ${CONSUMPTION_TYPES.map(m => `
              <button type="button" onclick="selectConsumption('${m}')" class="flex-1 py-1.5 rounded-full text-[12px] font-bold transition-colors ${selectedConsumption === m ? 'bg-white shadow-sm border border-[var(--accent-light)] text-[var(--accent-dark)]' : 'text-[#AFAFAF] border border-transparent hover:bg-white/50'}">${m}</button>
            `).join('')}
          </div>
        </div>
      `;
      document.getElementById('expense-extra-fields').innerHTML = html;
    }

    window.selectPayment = (m) => { selectedPayment = m; renderExtraFields(); };
    window.selectEPay = (m) => { selectedEPay = m; renderExtraFields(); };
    window.selectConsumption = (m) => { selectedConsumption = m; renderExtraFields(); };

    function handleAddSubmit() {
      const amountStr = document.getElementById('input-amount').value;
      const date = document.getElementById('input-date').value;
      const note = document.getElementById('input-note').value;
      
      if (!amountStr || isNaN(amountStr) || Number(amountStr) <= 0) return;
      if (!selectedCategory) return showToast('請先建立或選擇一個分類喔！', true);

      const newTx = {
        id: Date.now(),
        type: modalType,
        amount: parseFloat(amountStr),
        category: selectedCategory.name,
        subcategory: selectedSubcategory, 
        icon: selectedCategory.icon,
        color: selectedCategory.color,
        date: date,
        note: note,
        paymentMethod: modalType === 'expense' ? selectedPayment : null,
        ePayMethod: (modalType === 'expense' && selectedPayment === '電子支付') ? selectedEPay : null,
        consumptionType: modalType === 'expense' ? selectedConsumption : null
      };

      if (editingTransactionId) {
        transactions = transactions.map(t => t.id === editingTransactionId ? newTx : t);
        showToast('修改已儲存');
      } else {
        transactions.unshift(newTx);
        showToast('記帳成功！');
      }
      
      localStorage.setItem('green_gingham_transactions', JSON.stringify(transactions));

      renderAll();
      closeModal();
      closeDayDetail();
      
      if (!document.getElementById('search-modal').classList.contains('hidden')) {
         executeSearch();
      }
    }

    function openDayDetail(dateStr) {
      const dayTrans = transactions.filter(t => t.date === dateStr);
      
      document.getElementById('detail-date-title').innerText = dateStr.replace(/-/g, ' . ');

      const listContainer = document.getElementById('detail-transactions-list');
      
      if (dayTrans.length === 0) {
        listContainer.innerHTML = `
          <div class="text-center py-10 text-[#AFAFAF]">
            <i data-lucide="coffee" class="w-8 h-8 mx-auto mb-3 opacity-30 text-[#83BA61]"></i>
            <p class="font-bold text-[13px] tracking-widest">這天沒有記帳紀錄喔</p>
          </div>
        `;
      } else {
        listContainer.innerHTML = `
          <div class="bg-white rounded-[24px] shadow-[0_2px_15px_rgba(0,0,0,0.015)] border border-[#F5F5F5] overflow-hidden">
            ${dayTrans.map((t, index) => `
              <div onclick="openModal(${t.id})" class="flex items-center justify-between p-4 ${index !== dayTrans.length - 1 ? 'border-b border-[#F8F8F8]' : ''} hover:bg-[#FAFAF8] transition-colors cursor-pointer active:bg-[#F0F0F0]">
                <div class="flex items-center gap-4">
                  <div class="w-[46px] h-[46px] rounded-full flex items-center justify-center shrink-0" style="background-color: ${t.color}">
                    <i data-lucide="${t.icon}" class="w-5 h-5 text-[#7A7A7A] stroke-[1.5]"></i>
                  </div>
                  <div class="flex flex-col justify-center items-start">
                    <div class="flex items-center flex-wrap gap-1">
                      <p class="font-bold text-[#4A4A4A] text-[14px] m-0 leading-tight">
                        ${t.category} ${t.subcategory && t.subcategory !== '未分類' ? `<span class="text-[12px] text-[#AFAFAF] font-normal ml-1">${t.subcategory}</span>` : ''}
                      </p>
                      ${t.type === 'expense' && t.paymentMethod ? `<span class="text-[9px] bg-[var(--bg-base)] text-[#83BA61] px-1.5 py-[2px] rounded-md font-bold transition-colors ml-1">${t.paymentMethod === '電子支付' && t.ePayMethod ? t.ePayMethod : t.paymentMethod}</span>` : ''}
                      ${t.type === 'expense' && t.consumptionType === '線上消費' ? `<span class="text-[9px] bg-[var(--accent-light)] text-[var(--accent-primary)] px-1.5 py-[2px] rounded-md font-bold transition-colors ml-1">線上</span>` : ''}
                    </div>
                    ${t.note ? `<p class="text-[11px] text-[#AFAFAF] mt-1 m-0">${t.note}</p>` : ''}
                  </div>
                </div>
                <span class="font-bold text-[16px] font-num ${t.type === 'income' ? 'text-[#83BA61]' : 'text-[#5A5A5A]'}">
                  ${t.type === 'income' ? '+' : '-'}$${formatMoney(t.amount)}
                </span>
              </div>
            `).join('')}
          </div>
        `;
      }
      
      document.getElementById('day-detail-modal').classList.remove('hidden');
      lucide.createIcons(); 
    }

    function closeDayDetail() {
      document.getElementById('day-detail-modal').classList.add('hidden');
    }

    function generateAndDownloadCSV(dataArray, filenamePrefix) {
      if (dataArray.length === 0) {
        showToast('這段期間沒有任何紀錄可以匯出喔！', true);
        return;
      }

      let csvContent = "\uFEFF"; 
      csvContent += "日期,收支類型,主分類,次分類,金額,付款方式,消費類型,備註\n";

      dataArray.forEach(t => {
        const typeStr = t.type === 'income' ? '收入' : '支出';
        const subcatStr = t.subcategory || '-';
        const payment = t.type === 'expense' ? (t.paymentMethod === '電子支付' && t.ePayMethod ? t.ePayMethod : (t.paymentMethod || '未指定')) : '-';
        const consumption = t.type === 'expense' ? (t.consumptionType || '未指定') : '-';
        const safeNote = t.note ? t.note.replace(/,/g, "，").replace(/\n/g, " ") : ''; 

        const row = `${t.date},${typeStr},${t.category},${subcatStr},${t.amount},${payment},${consumption},${safeNote}`;
        csvContent += row + "\n";
      });

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      
      const todayStr = formatDateYYYYMMDD(new Date()).replace(/-/g, '');
      link.setAttribute("href", url);
      link.setAttribute("download", `方格子記帳本_${filenamePrefix}_${todayStr}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      showToast(`已成功下載 ${dataArray.length} 筆紀錄`);
    }

    function exportRangeCSV() {
      const startDate = document.getElementById('export-start-date').value;
      const endDate = document.getElementById('export-end-date').value;

      if (!startDate || !endDate) {
        showToast('請先選擇完整的起訖日期喔！', true);
        return;
      }

      if (startDate > endDate) {
        showToast('起始日期不能大於結束日期喔！', true);
        return;
      }

      const filteredData = transactions.filter(t => t.date >= startDate && t.date <= endDate);
      generateAndDownloadCSV(filteredData, `區間備份_${startDate}至${endDate}`);
    }

    function exportAllCSV() {
      generateAndDownloadCSV(transactions, '全部備份');
    }

    let searchFilters = { keyword: '', type: 'all', payment: 'all' };

    function openSearchModal() {
      searchFilters = { keyword: '', type: 'all', payment: 'all' };
      document.getElementById('search-keyword').value = '';
      updateSearchFilterUI();
      executeSearch();
      document.getElementById('search-modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('search-keyword').focus(), 100);
    }

    function closeSearchModal() {
      document.getElementById('search-modal').classList.add('hidden');
    }

    function setSearchFilter(key, value) {
      searchFilters[key] = value;
      updateSearchFilterUI();
      executeSearch();
    }

    function updateSearchFilterUI() {
      ['all', 'expense', 'income'].forEach(t => {
        const btn = document.getElementById(`s-type-${t}`);
        if (t === searchFilters.type) {
          btn.className = 'flex-1 py-1.5 rounded-full text-[13px] font-bold transition-colors bg-[var(--accent-light)] text-[var(--accent-dark)] shadow-sm';
        } else {
          btn.className = 'flex-1 py-1.5 rounded-full text-[13px] font-bold transition-colors text-[#AFAFAF] hover:bg-white/50 border border-transparent';
        }
      });

      ['all', 'cash', 'credit', 'epay', 'transfer'].forEach((p, idx) => {
        const vals = ['all', '現金', '信用卡', '電子支付', '轉帳'];
        const btn = document.getElementById(`s-pay-${p}`);
        if (vals[idx] === searchFilters.payment) {
          btn.className = 'shrink-0 px-4 py-1.5 rounded-full text-[12px] font-bold transition-colors bg-[var(--accent-light)] text-[var(--accent-dark)] shadow-sm';
        } else {
          btn.className = 'shrink-0 px-4 py-1.5 rounded-full text-[12px] font-bold transition-colors text-[#AFAFAF] hover:bg-white/50 border border-transparent';
        }
      });
    }

    function executeSearch() {
      searchFilters.keyword = document.getElementById('search-keyword').value.toLowerCase();

      const filtered = transactions.filter(t => {
        const matchKeyword = !searchFilters.keyword || 
                             t.category.toLowerCase().includes(searchFilters.keyword) || 
                             (t.subcategory && t.subcategory.toLowerCase().includes(searchFilters.keyword)) || 
                             (t.note && t.note.toLowerCase().includes(searchFilters.keyword)) ||
                             (t.amount.toString().includes(searchFilters.keyword));

        const matchType = searchFilters.type === 'all' || t.type === searchFilters.type;
        const matchPayment = searchFilters.payment === 'all' || 
                             t.paymentMethod === searchFilters.payment || 
                             (t.type === 'income' && searchFilters.payment === 'all'); 

        return matchKeyword && matchType && matchPayment;
      });

      renderSearchResults(filtered);
    }

    function renderSearchResults(results) {
      const listContainer = document.getElementById('search-results-list');
      const countEl = document.getElementById('search-count');
      const summaryEl = document.getElementById('search-summary');
      
      countEl.innerText = `${results.length} 筆紀錄`;

      let totalExp = 0; let totalInc = 0;
      results.forEach(t => {
        if(t.type === 'expense') totalExp += t.amount;
        else totalInc += t.amount;
      });

      let summaryHtml = '';
      if (totalExp > 0 || totalInc === 0) summaryHtml += `<span class="text-[12px] font-bold text-[#FF8B8B] font-num bg-white px-2 py-0.5 rounded-md shadow-sm border border-[#F0F0F0]">支 $${formatMoney(totalExp)}</span>`;
      if (totalInc > 0) summaryHtml += `<span class="text-[12px] font-bold text-[#83BA61] font-num bg-white px-2 py-0.5 rounded-md shadow-sm border border-[#F0F0F0]">收 $${formatMoney(totalInc)}</span>`;
      summaryEl.innerHTML = summaryHtml;

      if (results.length === 0) {
        listContainer.innerHTML = `
          <div class="text-center py-12 bg-white/60 backdrop-blur-md rounded-[32px] border border-white shadow-[0_4px_15px_rgba(0,0,0,0.02)] mt-4">
            <i data-lucide="search-x" class="w-10 h-10 text-[#D1D1D6] mx-auto mb-3"></i>
            <p class="font-bold text-[14px] text-[#AFAFAF] tracking-wide">找不到符合的紀錄</p>
          </div>
        `;
      } else {
        const sorted = [...results].sort((a, b) => new Date(b.date) - new Date(a.date));
        
        listContainer.innerHTML = `
          <div class="bg-white rounded-[28px] shadow-[0_2px_15px_rgba(0,0,0,0.015)] border border-[#F5F5F5] overflow-hidden mt-2">
            ${sorted.map((t, index) => `
              <div onclick="openModal(${t.id})" class="flex flex-col p-4 ${index !== sorted.length - 1 ? 'border-b border-[#F8F8F8]' : ''} hover:bg-[#FAFAF8] transition-colors cursor-pointer active:bg-[#F0F0F0]">
                
                <div class="flex justify-between items-center mb-2">
                   <span class="text-[10px] font-bold text-[var(--accent-primary)] bg-[var(--accent-light)] px-2 py-0.5 rounded flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>${t.date.replace(/-/g, '/')}</span>
                   <span class="font-bold text-[16px] font-num ${t.type === 'income' ? 'text-[#83BA61]' : 'text-[#5A5A5A]'}">
                     ${t.type === 'income' ? '+' : '-'}$${formatMoney(t.amount)}
                   </span>
                </div>

                <div class="flex items-center gap-4">
                  <div class="w-[42px] h-[42px] rounded-full flex items-center justify-center shrink-0" style="background-color: ${t.color}">
                    <i data-lucide="${t.icon}" class="w-5 h-5 text-[#7A7A7A] stroke-[1.5]"></i>
                  </div>
                  <div class="flex flex-col justify-center items-start">
                    <div class="flex items-center flex-wrap gap-1">
                      <p class="font-bold text-[#4A4A4A] text-[14px] m-0 leading-tight">
                        ${t.category} ${t.subcategory && t.subcategory !== '未分類' ? `<span class="text-[12px] text-[#AFAFAF] font-normal ml-1">${t.subcategory}</span>` : ''}
                      </p>
                      ${t.type === 'expense' && t.paymentMethod ? `<span class="text-[9px] bg-[var(--bg-base)] text-[#83BA61] px-1.5 py-[2px] rounded-md font-bold transition-colors ml-1">${t.paymentMethod === '電子支付' && t.ePayMethod ? t.ePayMethod : t.paymentMethod}</span>` : ''}
                      ${t.type === 'expense' && t.consumptionType === '線上消費' ? `<span class="text-[9px] bg-[var(--accent-light)] text-[var(--accent-primary)] px-1.5 py-[2px] rounded-md font-bold transition-colors ml-1">線上</span>` : ''}
                    </div>
                    ${t.note ? `<p class="text-[12px] text-[#AFAFAF] mt-1 m-0">${t.note}</p>` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
      lucide.createIcons(); 
    }

  </script>
</body>
</html>
