<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>*綠格子記帳本*</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@600;700;800;900&display=swap');
    
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #F0F7EB;
      min-height: 100vh;
      color: #4A4A4A;
      margin: 0;
      overflow-x: hidden;
    }

    .font-num {
      font-family: 'Nunito', sans-serif;
    }

    /* 春日野餐格紋底圖 */
    .bg-gingham {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: #F0F7EB;
      background-image:
        linear-gradient(90deg, rgba(162, 212, 137, 0.25) 50%, transparent 50%),
        linear-gradient(rgba(162, 212, 137, 0.25) 50%, transparent 50%);
      background-size: 32px 32px;
    }

    /* 手繪風小雛菊裝飾 */
    .daisy {
      position: fixed;
      width: 26px;
      height: 26px;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23FFF'%3E%3Ccircle cx='12' cy='5' r='4'/%3E%3Ccircle cx='12' cy='19' r='4'/%3E%3Ccircle cx='5' cy='12' r='4'/%3E%3Ccircle cx='19' cy='12' r='4'/%3E%3Ccircle cx='7' cy='7' r='4'/%3E%3Ccircle cx='17' cy='17' r='4'/%3E%3Ccircle cx='17' cy='7' r='4'/%3E%3Ccircle cx='7' cy='17' r='4'/%3E%3C/g%3E%3Ccircle cx='12' cy='12' r='4.5' fill='%23F5C249'/%3E%3C/svg%3E");
      background-size: contain;
      background-repeat: no-repeat;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06));
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .view-section {
      display: none;
      animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .view-section.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body class="pb-36 relative overflow-x-hidden bg-[#F0F7EB]">

  <div class="bg-gingham"></div>
  <div class="daisy top-[12%] right-[15%] rotate-12 scale-110"></div>
  <div class="daisy top-[35%] left-[8%] -rotate-12 scale-90 opacity-90"></div>
  <div class="daisy top-[60%] right-[10%] rotate-45 scale-75 opacity-80"></div>
  <div class="daisy bottom-[20%] left-[12%] rotate-12 scale-100"></div>
  <div class="daisy top-[6%] left-[30%] rotate-[20deg] scale-[0.65] opacity-70"></div>

  <div id="app-container" class="relative z-10 min-h-screen max-w-md mx-auto">
    
    <div id="view-home" class="view-section active p-6 space-y-8 pb-32">
      <header class="pt-8">
        <div class="text-center mb-8 relative px-2">
          <div class="absolute left-[10%] top-[10%] w-40 h-40 bg-[#90C86D]/15 rounded-full mix-blend-multiply filter blur-3xl z-0 pointer-events-none"></div>
          <div class="absolute right-[10%] bottom-[10%] w-40 h-40 bg-[#C7B5F8]/15 rounded-full mix-blend-multiply filter blur-3xl z-0 pointer-events-none"></div>
          
          <div class="relative z-10 flex flex-col items-center">
            <div class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-md px-4 py-1.5 rounded-full mb-6 border border-white shadow-sm">
              <i data-lucide="sun" class="w-3.5 h-3.5 text-[#F5C249]"></i>
              <p id="home-date" class="text-xs font-bold text-[#AFAFAF] font-num tracking-wider"></p>
            </div>
            
            <div class="flex items-center justify-center gap-1.5 mb-2 text-[#AFAFAF]">
               <i data-lucide="wallet" class="w-[14px] h-[14px]"></i>
               <span class="text-[12px] font-bold tracking-widest">本月結餘</span>
            </div>
            <h2 id="home-balance" class="font-num text-[56px] font-black text-[#4A4A4A] tracking-tighter mb-8 drop-shadow-sm leading-none">$0</h2>
            
            <div class="flex w-full max-w-[320px] mx-auto justify-between gap-3">
              <div class="flex-1 flex items-center gap-3 bg-white/60 backdrop-blur-sm border border-white/80 p-3 rounded-[24px] shadow-[0_4px_15px_rgba(0,0,0,0.02)]">
                <div class="w-[34px] h-[34px] rounded-full bg-[#E4F9E9] flex items-center justify-center shrink-0">
                  <i data-lucide="arrow-down-left" class="w-[18px] h-[18px] text-[#83BA61] stroke-[2.5]"></i>
                </div>
                <div class="text-left flex-1 overflow-hidden">
                  <p class="text-[10px] text-[#AFAFAF] font-bold tracking-widest mb-0.5">收入</p>
                  <p id="home-income" class="font-num font-bold text-[#83BA61] text-[15px] truncate">$0</p>
                </div>
              </div>
              <div class="flex-1 flex items-center gap-3 bg-white/60 backdrop-blur-sm border border-white/80 p-3 rounded-[24px] shadow-[0_4px_15px_rgba(0,0,0,0.02)]">
                <div class="w-[34px] h-[34px] rounded-full bg-[#FFE4DE] flex items-center justify-center shrink-0">
                  <i data-lucide="arrow-up-right" class="w-[18px] h-[18px] text-[#FF8B8B] stroke-[2.5]"></i>
                </div>
                <div class="text-left flex-1 overflow-hidden">
                  <p class="text-[10px] text-[#AFAFAF] font-bold tracking-widest mb-0.5">支出</p>
                  <p id="home-expense" class="font-num font-bold text-[#FF8B8B] text-[15px] truncate">$0</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div>
        <h3 class="text-sm font-bold text-[#AFAFAF] mb-4 ml-1 tracking-widest">近期紀錄</h3>
        <div id="home-transactions" class="space-y-6">
          </div>
      </div>
    </div>

    <div id="view-calendar" class="view-section p-6 h-full pb-32">
      <header class="flex justify-between items-center mb-6 pt-8 px-2">
        <h2 class="text-[22px] font-bold text-[#4A4A4A]">月曆</h2>
        <div class="flex items-center gap-2 bg-white/60 backdrop-blur-md p-1 rounded-2xl border border-white">
          <!-- 加上 onclick 綁定切換上個月的函式 -->
          <button onclick="prevMonth()" class="p-1.5 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
          <div class="px-2">
            <!-- 加上 id="calendar-month-display" 讓 JS 可以動態修改文字 -->
            <span id="calendar-month-display" class="font-num font-bold text-[#7D5AE0] text-sm tracking-wide"></span>
          </div>
          <!-- 加上 onclick 綁定切換下個月的函式 -->
          <button onclick="nextMonth()" class="p-1.5 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>
      </header>

      <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0] pb-8">
        <div class="grid grid-cols-7 gap-y-6 text-center" id="calendar-grid">
          </div>
      </div>
    </div>

    <div id="view-chart" class="view-section p-6 pb-32">
      <!-- 修改分析頁面的頭部，加入模式切換與時間選擇器 -->
      <header class="flex flex-col mb-6 pt-8 px-2 gap-4">
        <!-- 上半部：標題與模式切換 -->
        <div class="flex justify-between items-center">
          <h2 class="text-[22px] font-bold text-[#4A4A4A]">分析</h2>
          <div class="bg-white/60 backdrop-blur-md p-1 rounded-full border border-white flex text-[13px] font-bold text-[#AFAFAF] shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
            <button onclick="setChartMode('week')" id="btn-mode-week" class="px-4 py-1.5 rounded-full transition-colors border border-transparent">週</button>
            <button onclick="setChartMode('month')" id="btn-mode-month" class="px-4 py-1.5 rounded-full transition-colors bg-white text-[#7D5AE0] shadow-sm border border-[#F0F0F0]">月</button>
            <button onclick="setChartMode('year')" id="btn-mode-year" class="px-4 py-1.5 rounded-full transition-colors border border-transparent">年</button>
          </div>
        </div>
        <!-- 下半部：時間區間選擇器 -->
        <div class="flex items-center justify-between bg-white/60 backdrop-blur-md p-1.5 rounded-[20px] border border-white shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
          <button onclick="prevChartPeriod()" class="p-2 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
          <div class="px-2">
            <span id="chart-period-display" class="font-num font-bold text-[#7D5AE0] text-[15px] tracking-wide"></span>
          </div>
          <button onclick="nextChartPeriod()" class="p-2 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>
      </header>

      <div class="bg-white rounded-[32px] p-8 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0] flex flex-col items-center mb-6">
        
        <!-- ✨ 新增：支出/收入 切換按鈕 -->
        <div class="bg-[#F0F0F0]/80 p-1 rounded-full flex font-bold text-sm shadow-inner backdrop-blur-sm mb-8 w-full max-w-[200px] mx-auto">
          <button id="chart-tab-expense" onclick="setChartType('expense')" class="flex-1 py-1.5 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]">支出</button>
          <button id="chart-tab-income" onclick="setChartType('income')" class="flex-1 py-1.5 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent">收入</button>
        </div>

        <div id="chart-donut" class="w-48 h-48 rounded-full relative mb-10 transition-transform duration-700 hover:scale-105 flex items-center justify-center">
          <div class="absolute inset-4 bg-white rounded-full flex flex-col items-center justify-center shadow-[0_4px_20px_rgba(0,0,0,0.04)] z-10">
            <!-- ✨ 修改：加上 id 讓文字能動態切換 -->
            <span id="chart-center-label" class="text-[11px] text-[#AFAFAF] font-bold mb-0.5 tracking-widest">總支出</span>
            <span id="chart-total" class="font-num text-2xl font-black text-[#5A5A5A]">$0</span>
          </div>
          <div id="chart-empty" class="hidden absolute inset-0 rounded-full border-[4px] border-dashed border-[#F4F5F7] flex items-center justify-center z-20 bg-white">
            <span class="text-[#AFAFAF] font-bold text-sm">無資料</span>
          </div>
        </div>

        <div id="chart-list" class="w-full space-y-5">
          </div>
      </div>
    </div>

    <div id="view-settings" class="view-section p-8 text-center text-[#B0B0B0] mt-32">
      <div class="w-16 h-16 bg-white rounded-[20px] flex items-center justify-center mx-auto mb-4 shadow-sm border border-[#F0F0F0]">
        <i data-lucide="wrench" class="w-6 h-6 opacity-50"></i>
      </div>
      <p class="font-bold">更多功能準備中...</p>
    </div>

  </div> <div class="fixed bottom-6 left-6 right-6 max-w-[380px] mx-auto z-40">
    <div class="glass-panel rounded-[32px] px-6 py-4 flex justify-between items-center shadow-[0_8px_32px_rgba(0,0,0,0.06)] relative">
      
      <button onclick="switchView('home')" id="nav-home" class="nav-btn p-2 text-[#A888F9] scale-110 transition-all duration-300 relative">
        <i data-lucide="home" class="w-6 h-6"></i>
        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-[#A888F9] rounded-full active-dot"></span>
      </button>
      
      <button onclick="switchView('calendar')" id="nav-calendar" class="nav-btn p-2 text-[#D1D1D6] hover:text-[#BCAEE8] transition-all duration-300 relative">
        <i data-lucide="calendar" class="w-6 h-6"></i>
        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-transparent rounded-full active-dot transition-colors duration-300"></span>
      </button>
      
      <div class="w-14"></div> <button onclick="switchView('chart')" id="nav-chart" class="nav-btn p-2 text-[#D1D1D6] hover:text-[#BCAEE8] transition-all duration-300 relative">
        <i data-lucide="pie-chart" class="w-6 h-6"></i>
        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-transparent rounded-full active-dot transition-colors duration-300"></span>
      </button>
      
      <button onclick="switchView('settings')" id="nav-settings" class="nav-btn p-2 text-[#D1D1D6] hover:text-[#BCAEE8] transition-all duration-300 relative">
        <i data-lucide="settings" class="w-6 h-6"></i>
        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-transparent rounded-full active-dot transition-colors duration-300"></span>
      </button>

      <button onclick="openModal()" class="absolute -top-7 left-1/2 -translate-x-1/2 bg-[#90C86D] hover:bg-[#82BA5F] text-white w-[60px] h-[60px] rounded-full shadow-[0_8px_20px_rgba(144,200,109,0.4)] flex items-center justify-center transition-transform hover:scale-105 active:scale-95 border-[4px] border-white z-50">
        <i data-lucide="plus" class="w-7 h-7"></i>
      </button>
    </div>
  </div>

  <div id="add-modal" class="fixed inset-0 z-50 bg-[#FAFAF8]/95 backdrop-blur-xl overflow-y-auto hidden max-w-md mx-auto">
    <div class="bg-gingham opacity-40"></div>
    
    <div class="p-6 relative z-10 pb-6 min-h-screen flex flex-col animate-in slide-in-from-bottom-8 duration-300">
      <div class="flex justify-between items-center mb-6 pt-2">
        <button onclick="closeModal()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-[#AFAFAF] shadow-[0_2px_10px_rgba(0,0,0,0.03)] hover:bg-[#F4F5F7] transition-colors border border-[#F0F0F0]">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
        
        <div class="bg-[#F0F0F0]/80 p-1 rounded-full flex font-bold text-sm shadow-inner backdrop-blur-sm">
          <button id="tab-expense" onclick="switchType('expense')" class="px-8 py-2 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]">支出</button>
          <button id="tab-income" onclick="switchType('income')" class="px-8 py-2 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent">收入</button>
        </div>
        <div class="w-10"></div>
      </div>

      <form id="add-form" class="space-y-5 flex-1 flex flex-col">
        
        <div class="flex flex-col items-center py-2">
          <div class="flex items-center text-[44px] font-black text-[#4A4A4A] font-num leading-none">
            <span class="text-3xl mr-1 text-[#D1D1D6] -mt-1">$</span>
            <input type="number" id="input-amount" placeholder="0" required
              class="w-full max-w-[180px] text-center bg-transparent outline-none placeholder-[#E5E5E5]">
          </div>
          <div class="w-12 h-[2px] bg-[#EAE1FB] mt-2 rounded-full"></div>
        </div>

        <div>
          <h3 class="text-[11px] font-bold text-[#AFAFAF] mb-3 ml-2 tracking-widest uppercase">分類</h3>
          <div id="category-grid" class="grid grid-cols-4 gap-y-3 gap-x-2">
            </div>
        </div>

        <div class="space-y-3 pt-1 w-full">
          <div class="relative w-full">
             <i data-lucide="calendar" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#D1D1D6]"></i>
             <input type="date" id="input-date" required
              class="w-full box-border bg-white pl-11 pr-4 py-3.5 rounded-[20px] shadow-sm border border-[#F0F0F0] text-[#5A5A5A] font-num font-bold outline-none focus:border-[#C7B5F8] focus:ring-2 focus:ring-[#EAE1FB] transition-all appearance-none">
          </div>
          <div class="relative w-full">
             <i data-lucide="file-text" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#D1D1D6]"></i>
             <input type="text" id="input-note" placeholder="備註..."
              class="w-full box-border bg-white pl-11 pr-4 py-3.5 rounded-[20px] shadow-sm border border-[#F0F0F0] text-[#5A5A5A] font-bold outline-none focus:border-[#C7B5F8] focus:ring-2 focus:ring-[#EAE1FB] transition-all placeholder-[#D1D1D6]">
          </div>
        </div>

        <button type="submit" class="w-full bg-[#90C86D] hover:bg-[#82BA5F] text-white font-bold text-lg py-3.5 rounded-[20px] shadow-[0_8px_20px_rgba(144,200,109,0.3)] transition-transform active:scale-95 flex justify-center items-center gap-2 mt-auto tracking-wider shrink-0">
          完成
        </button>
      </form>
    </div>
  </div>

  <!-- ==================== (修改) 日期明細彈窗 ==================== -->
  <div id="day-detail-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-[#FAFAF8]/80 backdrop-blur-md hidden max-w-md mx-auto p-4 sm:p-6">
    <!-- 點擊空白處可關閉彈窗 (改為絕對定位覆蓋整個背景) -->
    <div class="absolute inset-0" onclick="closeDayDetail()"></div>
    
    <!-- 置中彈出卡片 -->
    <div class="bg-white w-full rounded-[32px] shadow-[0_10px_40px_rgba(0,0,0,0.08)] p-6 animate-in zoom-in-95 fade-in duration-200 relative border border-[#F0F0F0] max-h-[75vh] flex flex-col">
      
      <!-- 頂部標題與關閉按鈕 -->
      <div class="flex justify-between items-center mb-6 px-1 shrink-0">
        <div class="bg-[#F0F7EB] px-4 py-1.5 rounded-full border border-white shadow-sm">
          <span id="detail-date-title" class="font-num font-bold text-[#83BA61] text-sm tracking-wide"></span>
        </div>
        <button onclick="closeDayDetail()" class="w-8 h-8 bg-[#F4F5F7] rounded-full flex items-center justify-center text-[#AFAFAF] hover:bg-[#EAE1FB] hover:text-[#7D5AE0] transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- 紀錄列表 (加入 overflow-y-auto 確保資料過多時可以在卡片內部捲動) -->
      <div id="detail-transactions-list" class="space-y-4 overflow-y-auto no-scrollbar px-1 pb-2">
        <!-- 明細列表由 JS 生成 -->
      </div>
    </div>
  </div>

  <script>
    const EXPENSE_CATS = [
      { id: 'e1', name: '餐飲', icon: 'utensils', color: '#FFE4DE' },
      { id: 'e2', name: '交通', icon: 'bus', color: '#E4EEFF' },
      { id: 'e3', name: '購物', icon: 'shopping-bag', color: '#F8E8FA' },
      { id: 'e4', name: '娛樂', icon: 'film', color: '#E4F9E9' },
      { id: 'e5', name: '居住', icon: 'home', color: '#FFF8E1' },
      { id: 'e6', name: '零食', icon: 'coffee', color: '#F1E8DF' },
      { id: 'e7', name: '醫療', icon: 'pill', color: '#E3F9F6' },
      { id: 'e8', name: '其他', icon: 'sparkles', color: '#F2EBFC' },
    ];

    const INCOME_CATS = [
      { id: 'i1', name: '薪水', icon: 'briefcase', color: '#E4F9E9' },
      { id: 'i2', name: '零用錢', icon: 'coins', color: '#FFF8E1' },
      { id: 'i3', name: '獎金', icon: 'gift', color: '#F2EBFC' },
      { id: 'i4', name: '其他', icon: 'sparkles', color: '#E4EEFF' },
    ];

    let currentView = 'home';
    let modalType = 'expense';
    let selectedCategory = EXPENSE_CATS[0];
    
    // ✨ 新增：日曆當前顯示的年月狀態 (預設為現在真實的時間)
    let currentCalendarYear = new Date().getFullYear();
    let currentCalendarMonth = new Date().getMonth(); // 0-11
    
    // ✨ 新增：圖表分析的狀態管理
    let chartMode = 'month'; // 'week', 'month', 'year'
    let chartAnchorDate = new Date();
    let chartType = 'expense'; // ✨ 新增：控制分析畫面的收支狀態

    // ✨ 從 localStorage 讀取資料
    const savedData = localStorage.getItem('green_gingham_transactions');
    let transactions = savedData ? JSON.parse(savedData) : [];

    const currentMonthPrefix = '2026-04';

    document.addEventListener('DOMContentLoaded', () => {
      initDate();
      renderAll();
      switchType('expense');
      document.getElementById('add-form').addEventListener('submit', handleAddSubmit);
    });

    function formatMoney(num) {
      return num.toLocaleString('en-US');
    }

    function initDate() {
      const today = new Date();
      const dateStr = `${today.getFullYear()} . ${String(today.getMonth() + 1).padStart(2,'0')} . ${String(today.getDate()).padStart(2,'0')}`;
      document.getElementById('home-date').innerText = dateStr;
      
      // 設定表單預設日期為今天
      const formDateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      document.getElementById('input-date').value = formDateStr; 
    }

    function renderAll() {
      renderHome();
      renderCalendar();
      renderChart();
      lucide.createIcons();
    }

    function renderHome() {
      let income = 0; let expense = 0;
      transactions.filter(t => t.date.startsWith(currentMonthPrefix)).forEach(t => {
        if (t.type === 'income') income += t.amount;
        else expense += t.amount;
      });

      document.getElementById('home-income').innerText = `$${formatMoney(income)}`;
      document.getElementById('home-expense').innerText = `$${formatMoney(expense)}`;
      document.getElementById('home-balance').innerText = `$${formatMoney(income - expense)}`;

      const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
      const grouped = sorted.reduce((acc, t) => {
        if (!acc[t.date]) acc[t.date] = [];
        acc[t.date].push(t);
        return acc;
      }, {});

      const container = document.getElementById('home-transactions');
      
      if (transactions.length === 0) {
         container.innerHTML = `
           <div class="text-center py-12 text-[#AFAFAF]">
             <div class="w-16 h-16 bg-white rounded-[20px] flex items-center justify-center mx-auto mb-4 shadow-sm border border-[#F0F0F0]">
               <i data-lucide="inbox" class="w-6 h-6 opacity-50"></i>
             </div>
             <p class="font-bold text-sm">目前還沒有紀錄喔！</p>
           </div>
         `;
         return;
      }

      container.innerHTML = '';
      Object.keys(grouped).forEach(date => {
        const dateHtml = `
          <div class="mb-6">
            <div class="inline-block bg-white border border-[#F0F0F0] px-3 py-1 rounded-full mb-3 ml-1">
               <span class="text-[11px] font-bold text-[#A888F9] font-num">${date.substring(5).replace('-', '/')}</span>
            </div>
            <div class="bg-white rounded-[24px] shadow-[0_2px_15px_rgba(0,0,0,0.015)] border border-[#F5F5F5] overflow-hidden">
              ${grouped[date].map((t, index) => `
                <div class="flex items-center justify-between p-4 ${index !== grouped[date].length - 1 ? 'border-b border-[#F8F8F8]' : ''} hover:bg-[#FAFAF8] transition-colors">
                  <div class="flex items-center gap-4">
                    <div class="w-[52px] h-[52px] rounded-full flex items-center justify-center" style="background-color: ${t.color}">
                      <i data-lucide="${t.icon}" class="w-6 h-6 text-[#7A7A7A] stroke-[1.5]"></i>
                    </div>
                    <div class="flex flex-col justify-center">
                      <p class="font-bold text-[#4A4A4A] text-[15px] m-0 leading-tight">${t.category}</p>
                      ${t.note ? `<p class="text-[12px] text-[#AFAFAF] mt-1 m-0">${t.note}</p>` : ''}
                    </div>
                  </div>
                  <span class="font-bold text-[17px] font-num ${t.type === 'income' ? 'text-[#83BA61]' : 'text-[#5A5A5A]'}">
                    ${t.type === 'income' ? '+' : '-'}$${formatMoney(t.amount)}
                  </span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', dateHtml);
      });
    }

    function renderCalendar() {
      // 改用動態的變數，不再寫死
      const year = currentCalendarYear; 
      const month = currentCalendarMonth; 
      
      // 更新標題上的年月文字 (例如: 2026.04)
      document.getElementById('calendar-month-display').innerText = `${year}.${String(month + 1).padStart(2, '0')}`;

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const weekDays = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
      let html = '';

      weekDays.forEach(d => {
        html += `<div class="text-[11px] font-bold text-[#C7B5F8] mb-2">${d}</div>`;
      });

      for (let i = 0; i < firstDay; i++) html += `<div></div>`;

      // 取得今天日期字串，用來標示「今天」
      const today = new Date();
      const todayStr = `${today.getFullYear()}-0${today.getMonth() + 1}-${String(today.getDate()).padStart(2, '0')}`;

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-0${month + 1}-${String(day).padStart(2, '0')}`;
        const dayTrans = transactions.filter(t => t.date === dateStr);
        const hasData = dayTrans.length > 0;
        const isToday = (dateStr === todayStr); // 動態判斷今天

        let circleClass = 'text-[#5A5A5A] font-medium';
        if (isToday) circleClass = 'bg-[#A888F9] text-white font-bold shadow-md';
        else if (hasData) circleClass = 'bg-[#white] border border-[#F0F0F0] text-[#4A4A4A] font-medium shadow-sm';

        let dotHtml = '';
        if (hasData && !isToday) {
          dotHtml = `<div class="absolute bottom-1 right-2 w-1.5 h-1.5 bg-[#D1D1D6] rounded-full"></div>`;
        } else if (hasData && isToday) {
          dotHtml = `<div class="absolute bottom-0 right-0 bg-white rounded-full p-[2px] shadow-sm"><i data-lucide="coffee" class="w-2.5 h-2.5 text-[#A888F9]"></i></div>`;
        }

        // ✨ 加上 onclick 事件，並傳入 dateStr
        html += `
          <div onclick="openDayDetail('${dateStr}')" class="flex flex-col items-center justify-center relative h-12 cursor-pointer font-num transition-transform hover:scale-110 active:scale-95">
            <div class="w-10 h-10 flex items-center justify-center rounded-full text-[15px] transition-all duration-200 ${circleClass}">
              ${day}
            </div>
            ${dotHtml}
          </div>
        `;
      }
      document.getElementById('calendar-grid').innerHTML = html;
    }

    // ✨ 新增：切換到上個月
    function prevMonth() {
      currentCalendarMonth--;
      if (currentCalendarMonth < 0) {
        currentCalendarMonth = 11; // 回到 12 月 (index 11)
        currentCalendarYear--;     // 年份減一
      }
      renderCalendar(); // 重新畫日曆
      lucide.createIcons(); // 因為重新渲染了圖示，需要呼叫這行讓咖啡杯小圖示出現
    }

    // ✨ 新增：切換到下個月
    function nextMonth() {
      currentCalendarMonth++;
      if (currentCalendarMonth > 11) {
        currentCalendarMonth = 0;  // 回到 1 月 (index 0)
        currentCalendarYear++;     // 年份加一
      }
      renderCalendar(); // 重新畫日曆
      lucide.createIcons(); // 重新渲染圖示
    }

    // ✨ 新增：取得週的起始與結束日期 (以週一為每週的第一天)
    function getWeekRange(date) {
      const d = new Date(date.getTime());
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const start = new Date(d.setDate(diff));
      const end = new Date(start.getTime());
      end.setDate(end.getDate() + 6);
      return { start, end };
    }

    // ✨ 新增：格式化日期為 YYYY-MM-DD，用來做資料比對
    function formatDateYYYYMMDD(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    // ✨ 新增：切換圖表模式 (週/月/年)
    function setChartMode(mode) {
      chartMode = mode;
      ['week', 'month', 'year'].forEach(m => {
        const btn = document.getElementById(`btn-mode-${m}`);
        if (m === mode) {
          btn.className = 'px-4 py-1.5 rounded-full transition-colors bg-white text-[#7D5AE0] shadow-sm border border-[#F0F0F0]';
        } else {
          btn.className = 'px-4 py-1.5 rounded-full transition-colors text-[#AFAFAF] hover:text-[#4A4A4A] border border-transparent';
        }
      });
      renderChart();
    }

    // ✨ 新增：圖表切換到上一個時間區間
    function prevChartPeriod() {
      if (chartMode === 'month') {
        chartAnchorDate.setMonth(chartAnchorDate.getMonth() - 1);
      } else if (chartMode === 'year') {
        chartAnchorDate.setFullYear(chartAnchorDate.getFullYear() - 1);
      } else if (chartMode === 'week') {
        chartAnchorDate.setDate(chartAnchorDate.getDate() - 7);
      }
      renderChart();
    }

    // ✨ 新增：圖表切換到下一個時間區間
    function nextChartPeriod() {
      if (chartMode === 'month') {
        chartAnchorDate.setMonth(chartAnchorDate.getMonth() + 1);
      } else if (chartMode === 'year') {
        chartAnchorDate.setFullYear(chartAnchorDate.getFullYear() + 1);
      } else if (chartMode === 'week') {
        chartAnchorDate.setDate(chartAnchorDate.getDate() + 7);
      }
      renderChart();
    }

    // ✨ 新增：切換圖表分析的 支出/收入
    function setChartType(type) {
      chartType = type;
      const btnExp = document.getElementById('chart-tab-expense');
      const btnInc = document.getElementById('chart-tab-income');
      
      if (type === 'expense') {
        btnExp.className = 'flex-1 py-1.5 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';
        btnInc.className = 'flex-1 py-1.5 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent';
        document.getElementById('chart-center-label').innerText = '總支出';
      } else {
        btnExp.className = 'flex-1 py-1.5 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent';
        btnInc.className = 'flex-1 py-1.5 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';
        document.getElementById('chart-center-label').innerText = '總收入';
      }
      renderChart();
    }

    function renderChart() {
      const displayEl = document.getElementById('chart-period-display');
      let startDateStr, endDateStr;

      // 1. 更新時間區間顯示文字
      if (chartMode === 'month') {
        displayEl.innerText = `${chartAnchorDate.getFullYear()} . ${String(chartAnchorDate.getMonth() + 1).padStart(2, '0')}`;
      } else if (chartMode === 'year') {
        displayEl.innerText = `${chartAnchorDate.getFullYear()}`;
      } else if (chartMode === 'week') {
        const { start, end } = getWeekRange(chartAnchorDate);
        startDateStr = formatDateYYYYMMDD(start);
        endDateStr = formatDateYYYYMMDD(end);
        displayEl.innerText = `${String(start.getMonth() + 1).padStart(2, '0')}.${String(start.getDate()).padStart(2, '0')} - ${String(end.getMonth() + 1).padStart(2, '0')}.${String(end.getDate()).padStart(2, '0')}`;
      }

      // 2. 根據目前模式與時間區間，篩選紀錄
      let totalExpense = 0;
      const expenses = transactions.filter(t => {
        if (t.type !== chartType) return false; // ✨ 修改：根據目前選擇的是支出還是收入來篩選
        
        if (chartMode === 'month') {
          const prefix = `${chartAnchorDate.getFullYear()}-${String(chartAnchorDate.getMonth() + 1).padStart(2, '0')}`;
          return t.date.startsWith(prefix);
        } else if (chartMode === 'year') {
          const prefix = `${chartAnchorDate.getFullYear()}`;
          return t.date.startsWith(prefix);
        } else if (chartMode === 'week') {
          // 在週的起訖日期之間
          return t.date >= startDateStr && t.date <= endDateStr;
        }
        return false;
      });
      
      const grouped = expenses.reduce((acc, t) => {
        totalExpense += t.amount;
        const existing = acc.find(c => c.name === t.category);
        if (existing) existing.amount += t.amount;
        else acc.push({ name: t.category, amount: t.amount, color: t.color, icon: t.icon });
        return acc;
      }, []);
      
      grouped.sort((a, b) => b.amount - a.amount);

      document.getElementById('chart-total').innerText = `$${formatMoney(totalExpense)}`;
      const donut = document.getElementById('chart-donut');
      const emptyState = document.getElementById('chart-empty');

      if (totalExpense > 0) {
        emptyState.classList.add('hidden');
        let cumulativePercent = 0;
        const gradientStops = grouped.map(item => {
          const percent = (item.amount / totalExpense) * 100;
          const start = cumulativePercent;
          const end = cumulativePercent + percent;
          cumulativePercent = end;
          return `${item.color} ${start}% ${end}%`;
        }).join(', ');
        donut.style.background = `conic-gradient(${gradientStops})`;
      } else {
        emptyState.classList.remove('hidden');
        donut.style.background = 'transparent';
      }

      const listContainer = document.getElementById('chart-list');
      listContainer.innerHTML = grouped.map(item => {
        const percent = ((item.amount / totalExpense) * 100).toFixed(1);
        return `
          <div class="flex items-center justify-between group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background-color: ${item.color}">
                 <i data-lucide="${item.icon}" class="w-5 h-5 text-[#7A7A7A] stroke-[1.5]"></i>
              </div>
              <span class="text-[#4A4A4A] font-bold text-[15px]">${item.name}</span>
            </div>
            <div class="flex items-center gap-4">
              <span class="text-[#D1D1D6] font-num text-sm font-bold w-10 text-right">${percent}%</span>
              <span class="font-bold text-[#5A5A5A] font-num text-lg w-16 text-right">$${formatMoney(item.amount)}</span>
            </div>
          </div>
        `;
      }).join('');
      
      lucide.createIcons(); // 更新圖表清單圖示
    }

    function switchView(viewName) {
      currentView = viewName;
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.getElementById(`view-${viewName}`).classList.add('active');
      
      const btns = ['home', 'calendar', 'chart', 'settings'];
      btns.forEach(btn => {
        const el = document.getElementById(`nav-${btn}`);
        const dot = el.querySelector('.active-dot');
        
        if (btn === viewName) {
          el.className = 'nav-btn p-2 text-[#A888F9] scale-110 transition-all duration-300 relative';
          dot.style.backgroundColor = '#A888F9';
        } else {
          el.className = 'nav-btn p-2 text-[#D1D1D6] hover:text-[#BCAEE8] transition-all duration-300 relative';
          dot.style.backgroundColor = 'transparent';
        }
      });
    }

    function openModal() {
      document.getElementById('add-modal').classList.remove('hidden');
    }
    
    function closeModal() {
      document.getElementById('add-modal').classList.add('hidden');
      document.getElementById('input-amount').value = '';
      document.getElementById('input-note').value = '';
    }

    function switchType(type) {
      modalType = type;
      const btnExp = document.getElementById('tab-expense');
      const btnInc = document.getElementById('tab-income');
      
      if (type === 'expense') {
        btnExp.className = 'px-8 py-2 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';
        btnInc.className = 'px-8 py-2 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent';
        renderCategories(EXPENSE_CATS);
      } else {
        btnExp.className = 'px-8 py-2 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent';
        btnInc.className = 'px-8 py-2 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';
        renderCategories(INCOME_CATS);
      }
    }

    function renderCategories(cats) {
      selectedCategory = cats[0]; 
      const container = document.getElementById('category-grid');
      
      const updateGrid = () => {
        container.innerHTML = cats.map(cat => {
          const isSelected = selectedCategory.id === cat.id;
          const btnClass = isSelected 
            ? `bg-white shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-[#EAE1FB] scale-105`
            : `hover:bg-white text-[#B0B0B0] border border-transparent`;
            
          const textClass = isSelected ? 'text-[#4A4A4A]' : '';

          return `
            <button type="button" onclick="selectCategory('${cat.id}')" class="flex flex-col items-center py-3 rounded-2xl transition-all duration-200 ${btnClass}">
              <div class="w-[42px] h-[42px] rounded-full flex items-center justify-center mb-2" style="background-color: ${cat.color}">
                <i data-lucide="${cat.icon}" class="w-5 h-5 text-[#7A7A7A] stroke-[1.5]"></i>
              </div>
              <span class="text-[12px] font-bold ${textClass}">${cat.name}</span>
            </button>
          `;
        }).join('');
        lucide.createIcons();
      };
      
      window.selectCategory = (id) => {
        selectedCategory = cats.find(c => c.id === id);
        updateGrid();
      };

      updateGrid();
    }

    function handleAddSubmit(e) {
      e.preventDefault();
      const amountStr = document.getElementById('input-amount').value;
      const date = document.getElementById('input-date').value;
      const note = document.getElementById('input-note').value;
      
      if (!amountStr || isNaN(amountStr) || Number(amountStr) <= 0) return;

      const newTx = {
        id: Date.now(),
        type: modalType,
        amount: parseFloat(amountStr),
        category: selectedCategory.name,
        icon: selectedCategory.icon,
        color: selectedCategory.color,
        date: date,
        note: note
      };

      // ✨ 將資料加進陣列，並存入 localStorage
      transactions.unshift(newTx);
      localStorage.setItem('green_gingham_transactions', JSON.stringify(transactions));

      renderAll();
      closeModal();
    }

    // ✨ 新增：打開與渲染日期明細彈窗
    function openDayDetail(dateStr) {
      const dayTrans = transactions.filter(t => t.date === dateStr);
      
      // 格式化標題日期 (例如: 2026.04.18)
      document.getElementById('detail-date-title').innerText = dateStr.replace(/-/g, ' . ');

      const listContainer = document.getElementById('detail-transactions-list');
      
      if (dayTrans.length === 0) {
        listContainer.innerHTML = `
          <div class="text-center py-10 text-[#AFAFAF]">
            <i data-lucide="coffee" class="w-8 h-8 mx-auto mb-3 opacity-30 text-[#83BA61]"></i>
            <p class="font-bold text-[13px] tracking-widest">這天沒有記帳紀錄喔</p>
          </div>
        `;
      } else {
        // 套用與首頁相同的精緻列表樣式
        listContainer.innerHTML = `
          <div class="bg-white rounded-[24px] shadow-[0_2px_15px_rgba(0,0,0,0.015)] border border-[#F5F5F5] overflow-hidden">
            ${dayTrans.map((t, index) => `
              <div class="flex items-center justify-between p-4 ${index !== dayTrans.length - 1 ? 'border-b border-[#F8F8F8]' : ''} hover:bg-[#FAFAF8] transition-colors">
                <div class="flex items-center gap-4">
                  <div class="w-[46px] h-[46px] rounded-full flex items-center justify-center" style="background-color: ${t.color}">
                    <i data-lucide="${t.icon}" class="w-5 h-5 text-[#7A7A7A] stroke-[1.5]"></i>
                  </div>
                  <div class="flex flex-col justify-center">
                    <p class="font-bold text-[#4A4A4A] text-[14px] m-0 leading-tight">${t.category}</p>
                    ${t.note ? `<p class="text-[11px] text-[#AFAFAF] mt-1 m-0">${t.note}</p>` : ''}
                  </div>
                </div>
                <span class="font-bold text-[16px] font-num ${t.type === 'income' ? 'text-[#83BA61]' : 'text-[#5A5A5A]'}">
                  ${t.type === 'income' ? '+' : '-'}$${formatMoney(t.amount)}
                </span>
              </div>
            `).join('')}
          </div>
        `;
      }
      
      document.getElementById('day-detail-modal').classList.remove('hidden');
      lucide.createIcons(); // 重新渲染剛生成的圖示
    }

    // ✨ 新增：關閉日期明細彈窗
    function closeDayDetail() {
      document.getElementById('day-detail-modal').classList.add('hidden');
    }
  </script>
</body>
</html>
