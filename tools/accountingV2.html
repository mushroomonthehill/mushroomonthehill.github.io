<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>**方格子記帳本**</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@600;700;800;900&display=swap');
    
    :root {
      /* 預設主題變數：會由 JS 動態抽換 */
      --bg-base: #F0F7EB;
      --bg-grid: rgba(162, 212, 137, 0.25);
      --accent-primary: #A888F9;
      --accent-dark: #7D5AE0;
      --accent-light: #EAE1FB;
      --accent-muted: #C7B5F8;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg-base);
      min-height: 100vh;
      color: #4A4A4A;
      margin: 0;
      overflow-x: hidden;
      transition: background-color 0.5s ease;
    }

    .font-num {
      font-family: 'Nunito', sans-serif;
    }

    /* 春日野餐格紋底圖 - 改吃 CSS 變數 */
    .bg-gingham {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: var(--bg-base);
      background-image:
        linear-gradient(90deg, var(--bg-grid) 50%, transparent 50%),
        linear-gradient(var(--bg-grid) 50%, transparent 50%);
      background-size: 32px 32px;
      transition: background-color 0.5s ease;
    }

    /* 手繪風小雛菊裝飾 */
    .daisy {
      position: fixed;
      width: 26px;
      height: 26px;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23FFF'%3E%3Ccircle cx='12' cy='5' r='4'/%3E%3Ccircle cx='12' cy='19' r='4'/%3E%3Ccircle cx='5' cy='12' r='4'/%3E%3Ccircle cx='19' cy='12' r='4'/%3E%3Ccircle cx='7' cy='7' r='4'/%3E%3Ccircle cx='17' cy='17' r='4'/%3E%3Ccircle cx='17' cy='7' r='4'/%3E%3Ccircle cx='7' cy='17' r='4'/%3E%3C/g%3E%3Ccircle cx='12' cy='12' r='4.5' fill='%23F5C249'/%3E%3C/svg%3E");
      background-size: contain;
      background-repeat: no-repeat;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06));
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .view-section {
      display: none;
      animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .view-section.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body class="pb-36 relative overflow-x-hidden transition-colors duration-500">

  <div class="bg-gingham"></div>
  <div class="daisy top-[12%] right-[15%] rotate-12 scale-110"></div>
  <div class="daisy top-[35%] left-[8%] -rotate-12 scale-90 opacity-90"></div>
  <div class="daisy top-[60%] right-[10%] rotate-45 scale-75 opacity-80"></div>
  <div class="daisy bottom-[20%] left-[12%] rotate-12 scale-100"></div>
  <div class="daisy top-[6%] left-[30%] rotate-[20deg] scale-[0.65] opacity-70"></div>

  <div id="app-container" class="relative z-10 min-h-screen max-w-md mx-auto">
    
    <div id="view-home" class="view-section active p-6 space-y-8 pb-32">
      <header class="pt-8">
        <div class="text-center mb-8 relative px-2">
          <div class="absolute left-[10%] top-[10%] w-40 h-40 bg-[var(--accent-primary)] opacity-10 rounded-full mix-blend-multiply filter blur-3xl z-0 pointer-events-none transition-colors"></div>
          <div class="absolute right-[10%] bottom-[10%] w-40 h-40 bg-[var(--accent-muted)] opacity-10 rounded-full mix-blend-multiply filter blur-3xl z-0 pointer-events-none transition-colors"></div>
          
          <div class="relative z-10 flex flex-col items-center">
            <div class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-md px-4 py-1.5 rounded-full mb-6 border border-white shadow-sm">
              <i data-lucide="sun" class="w-3.5 h-3.5 text-[#F5C249]"></i>
              <p id="home-date" class="text-xs font-bold text-[#AFAFAF] font-num tracking-wider"></p>
            </div>
            
            <!-- ✨ 修改：加上白底毛玻璃膠囊，並加深字體顏色 -->
            <div class="flex items-center justify-center gap-1.5 mb-2 text-[#7A7A7A] bg-white/60 backdrop-blur-md px-3 py-1 rounded-full border border-white shadow-sm">
               <i data-lucide="wallet" class="w-[14px] h-[14px]"></i>
               <span class="text-[12px] font-bold tracking-widest">本月結餘</span>
            </div>
            <h2 id="home-balance" class="font-num text-[56px] font-black text-[#4A4A4A] tracking-tighter mb-8 drop-shadow-sm leading-none">$0</h2>
            
            <div class="flex w-full max-w-[320px] mx-auto justify-between gap-3">
              <div class="flex-1 flex items-center gap-3 bg-white/60 backdrop-blur-sm border border-white/80 p-3 rounded-[24px] shadow-[0_4px_15px_rgba(0,0,0,0.02)]">
                <div class="w-[34px] h-[34px] rounded-full bg-[#E4F9E9] flex items-center justify-center shrink-0">
                  <i data-lucide="arrow-down-left" class="w-[18px] h-[18px] text-[#83BA61] stroke-[2.5]"></i>
                </div>
                <div class="text-left flex-1 overflow-hidden">
                  <p class="text-[10px] text-[#AFAFAF] font-bold tracking-widest mb-0.5">收入</p>
                  <p id="home-income" class="font-num font-bold text-[#83BA61] text-[15px] truncate">$0</p>
                </div>
              </div>
              <div class="flex-1 flex items-center gap-3 bg-white/60 backdrop-blur-sm border border-white/80 p-3 rounded-[24px] shadow-[0_4px_15px_rgba(0,0,0,0.02)]">
                <div class="w-[34px] h-[34px] rounded-full bg-[#FFE4DE] flex items-center justify-center shrink-0">
                  <i data-lucide="arrow-up-right" class="w-[18px] h-[18px] text-[#FF8B8B] stroke-[2.5]"></i>
                </div>
                <div class="text-left flex-1 overflow-hidden">
                  <p class="text-[10px] text-[#AFAFAF] font-bold tracking-widest mb-0.5">支出</p>
                  <p id="home-expense" class="font-num font-bold text-[#FF8B8B] text-[15px] truncate">$0</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div>
        <!-- ✨ 修改：加上圖示與白底毛玻璃膠囊，提升閱讀性與精緻度 -->
        <div class="inline-flex items-center gap-1.5 mb-4 ml-1 bg-white/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-white shadow-sm">
           <i data-lucide="clock" class="w-[14px] h-[14px] text-[var(--accent-primary)]"></i>
           <h3 class="text-[12px] font-bold text-[#7A7A7A] tracking-widest leading-none mt-[1px]">近期紀錄</h3>
        </div>
        <div id="home-transactions" class="space-y-6">
          </div>
      </div>
    </div>

    <div id="view-calendar" class="view-section p-6 h-full pb-32">
      <header class="flex justify-between items-center mb-6 pt-8 px-2">
        <h2 class="text-[22px] font-bold text-[#4A4A4A]">月曆</h2>
        <div class="flex items-center gap-2 bg-white/60 backdrop-blur-md p-1 rounded-2xl border border-white">
          <button onclick="prevMonth()" class="p-1.5 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
          <div class="px-2">
            <span id="calendar-month-display" class="font-num font-bold text-[var(--accent-dark)] text-sm tracking-wide"></span>
          </div>
          <button onclick="nextMonth()" class="p-1.5 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>
      </header>

      <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0] pb-8">
        <div class="grid grid-cols-7 gap-y-6 text-center" id="calendar-grid">
          </div>
      </div>
    </div>

    <div id="view-chart" class="view-section p-6 pb-32">
      <header class="flex flex-col mb-6 pt-8 px-2 gap-4">
        <div class="flex justify-between items-center">
          <h2 class="text-[22px] font-bold text-[#4A4A4A]">分析</h2>
          <div class="bg-white/60 backdrop-blur-md p-1 rounded-full border border-white flex text-[13px] font-bold text-[#AFAFAF] shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
            <button onclick="setChartMode('day')" id="btn-mode-day" class="px-3.5 py-1.5 rounded-full transition-colors border border-transparent">日</button>
            <button onclick="setChartMode('week')" id="btn-mode-week" class="px-3.5 py-1.5 rounded-full transition-colors border border-transparent">週</button>
            <button onclick="setChartMode('month')" id="btn-mode-month" class="px-3.5 py-1.5 rounded-full transition-colors bg-white text-[var(--accent-dark)] shadow-sm border border-[#F0F0F0]">月</button>
            <button onclick="setChartMode('year')" id="btn-mode-year" class="px-3.5 py-1.5 rounded-full transition-colors border border-transparent">年</button>
          </div>
        </div>
        <div class="flex items-center justify-between bg-white/60 backdrop-blur-md p-1.5 rounded-[20px] border border-white shadow-[0_2px_10px_rgba(0,0,0,0.02)]">
          <button onclick="prevChartPeriod()" class="p-2 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
          <div class="px-2">
            <span id="chart-period-display" class="font-num font-bold text-[var(--accent-dark)] text-[15px] tracking-wide"></span>
          </div>
          <button onclick="nextChartPeriod()" class="p-2 text-[#AFAFAF] hover:text-[#4A4A4A] transition-colors"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
        </div>
      </header>

      <div class="bg-white rounded-[32px] p-8 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0] flex flex-col items-center mb-6">
        
        <div class="bg-[#F0F0F0]/80 p-1 rounded-full flex font-bold text-sm shadow-inner backdrop-blur-sm mb-4 w-full max-w-[200px] mx-auto">
          <button id="chart-tab-expense" onclick="setChartType('expense')" class="flex-1 py-1.5 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]">支出</button>
          <button id="chart-tab-income" onclick="setChartType('income')" class="flex-1 py-1.5 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent">收入</button>
        </div>

        <div id="chart-dimension-tabs" class="flex gap-2 justify-center mb-8 w-full max-w-[260px] mx-auto transition-all duration-300">
          <button id="dim-tab-category" onclick="setChartDimension('category')" class="flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all bg-[var(--accent-light)] text-[var(--accent-dark)] shadow-sm">分類</button>
          <button id="dim-tab-payment" onclick="setChartDimension('payment')" class="flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all text-[#AFAFAF] hover:bg-[#F8F9FA]">付款</button>
          <button id="dim-tab-consumption" onclick="setChartDimension('consumption')" class="flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all text-[#AFAFAF] hover:bg-[#F8F9FA]">消費類型</button>
        </div>

        <div id="chart-donut" class="w-48 h-48 rounded-full relative mb-10 transition-transform duration-700 hover:scale-105 flex items-center justify-center">
          <div class="absolute inset-4 bg-white rounded-full flex flex-col items-center justify-center shadow-[0_4px_20px_rgba(0,0,0,0.04)] z-10">
            <span id="chart-center-label" class="text-[11px] text-[#AFAFAF] font-bold mb-0.5 tracking-widest">總支出</span>
            <span id="chart-total" class="font-num text-2xl font-black text-[#5A5A5A]">$0</span>
          </div>
          <div id="chart-empty" class="hidden absolute inset-0 rounded-full border-[4px] border-dashed border-[#F4F5F7] flex items-center justify-center z-20 bg-white">
            <span class="text-[#AFAFAF] font-bold text-sm">無資料</span>
          </div>
        </div>

        <div id="chart-list" class="w-full space-y-5">
          </div>
      </div>
    </div>

    <!-- ==================== ✨ 新增：設定與主題視圖 ==================== -->
    <div id="view-settings" class="view-section p-6 pb-32">
      <header class="flex justify-between items-center mb-8 pt-8 px-2">
        <h2 class="text-[22px] font-bold text-[#4A4A4A]">設定與自訂</h2>
      </header>

      <div class="space-y-6">
        <!-- 桌布樣式 -->
        <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0]">
          <h3 class="text-[13px] font-bold text-[#AFAFAF] mb-5 tracking-widest flex items-center gap-2">
            <i data-lucide="image" class="w-4 h-4"></i> 桌布樣式
          </h3>
          <!-- ✨ 修改：增加 gap-y-4 讓上下兩排不會黏在一起 -->
          <div class="grid grid-cols-5 gap-y-4 gap-x-2" id="wallpaper-options">
          </div>
        </div>

        <!-- 文字配色 -->
        <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0]">
          <h3 class="text-[13px] font-bold text-[#AFAFAF] mb-5 tracking-widest flex items-center gap-2">
            <i data-lucide="palette" class="w-4 h-4"></i> 主題配色
          </h3>
          <!-- ✨ 修改：把原本的 flex 換成 grid grid-cols-5，強制它一排只能放五個，剩下的自動換行 -->
          <div class="grid grid-cols-5 gap-y-4 gap-x-2" id="accent-options">
            </div>
        </div>

        <!-- ✨ 新增：資料管理區塊與匯出按鈕 -->
        <div class="bg-white rounded-[32px] p-6 shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F0F0F0]">
          <h3 class="text-[13px] font-bold text-[#AFAFAF] mb-5 tracking-widest flex items-center gap-2">
            <i data-lucide="database" class="w-4 h-4"></i> 資料管理
          </h3>
          <div class="flex flex-col gap-3">
            <button onclick="exportToCSV()" class="w-full flex items-center justify-center gap-2 py-3.5 rounded-[20px] font-bold transition-all bg-[var(--accent-light)] text-[var(--accent-dark)] hover:scale-[1.02] active:scale-95 shadow-sm">
              <i data-lucide="download" class="w-5 h-5"></i> 匯出記帳資料 (CSV)
            </button>
            <p class="text-[11px] text-[#AFAFAF] text-center mt-1">匯出的檔案可使用 Excel 或 Google 試算表開啟</p>
          </div>
        </div>

      </div>
    </div>

  </div> <div class="fixed bottom-6 left-6 right-6 max-w-[380px] mx-auto z-40">
    <div class="glass-panel rounded-[32px] px-6 py-4 flex justify-between items-center shadow-[0_8px_32px_rgba(0,0,0,0.06)] relative">
      
      <button onclick="switchView('home')" id="nav-home" class="nav-btn p-2 text-[var(--accent-primary)] scale-110 transition-all duration-300 relative">
        <i data-lucide="home" class="w-6 h-6"></i>
        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-[var(--accent-primary)] rounded-full active-dot"></span>
      </button>
      
      <button onclick="switchView('calendar')" id="nav-calendar" class="nav-btn p-2 text-[#D1D1D6] hover:text-[var(--accent-muted)] transition-all duration-300 relative">
        <i data-lucide="calendar" class="w-6 h-6"></i>
        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-transparent rounded-full active-dot transition-colors duration-300"></span>
      </button>
      
      <div class="w-14"></div> <button onclick="switchView('chart')" id="nav-chart" class="nav-btn p-2 text-[#D1D1D6] hover:text-[var(--accent-muted)] transition-all duration-300 relative">
        <i data-lucide="pie-chart" class="w-6 h-6"></i>
        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-transparent rounded-full active-dot transition-colors duration-300"></span>
      </button>
      
      <button onclick="switchView('settings')" id="nav-settings" class="nav-btn p-2 text-[#D1D1D6] hover:text-[var(--accent-muted)] transition-all duration-300 relative">
        <i data-lucide="settings" class="w-6 h-6"></i>
        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-transparent rounded-full active-dot transition-colors duration-300"></span>
      </button>

      <!-- ✨ 修改：移除 style 發光陰影，改用乾淨柔和的灰階 shadow -->
      <button onclick="openModal()" class="absolute -top-7 left-1/2 -translate-x-1/2 bg-[var(--accent-primary)] hover:bg-[var(--accent-dark)] text-white w-[60px] h-[60px] rounded-full shadow-[0_8px_16px_rgba(0,0,0,0.1)] flex items-center justify-center transition-all hover:scale-105 active:scale-95 border-[4px] border-white z-50">
        <i data-lucide="plus" class="w-7 h-7"></i>
      </button>
    </div>
  </div>

  <div id="add-modal" class="fixed inset-0 z-[60] bg-[#FAFAF8]/95 backdrop-blur-xl overflow-y-auto hidden max-w-md mx-auto">
    <div class="bg-gingham opacity-40"></div>
    
    <div class="p-6 relative z-10 pb-6 min-h-screen flex flex-col animate-in slide-in-from-bottom-8 duration-300">
      <div class="flex justify-between items-center mb-6 pt-2">
        <div class="flex gap-2">
          <button onclick="closeModal()" class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-[#AFAFAF] shadow-[0_2px_10px_rgba(0,0,0,0.03)] hover:bg-[#F4F5F7] transition-colors border border-[#F0F0F0]">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
          <button id="btn-delete-tx" type="button" onclick="deleteTransaction()" class="hidden w-10 h-10 bg-[#FFF5F5] rounded-full flex items-center justify-center text-[#FF8B8B] shadow-sm hover:bg-[#FFEBEB] transition-colors border border-[#FFEBEB]">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
        
        <div class="bg-[#F0F0F0]/80 p-1 rounded-full flex font-bold text-sm shadow-inner backdrop-blur-sm">
          <button id="tab-expense" onclick="switchType('expense')" class="px-8 py-2 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]">支出</button>
          <button id="tab-income" onclick="switchType('income')" class="px-8 py-2 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent">收入</button>
        </div>
        <div class="w-10"></div>
      </div>

      <form id="add-form" class="space-y-5 flex-1 flex flex-col">
        
        <div class="flex flex-col items-center py-2">
          <div class="flex items-center text-[44px] font-black text-[#4A4A4A] font-num leading-none">
            <span class="text-3xl mr-1 text-[#D1D1D6] -mt-1">$</span>
            <input type="number" id="input-amount" placeholder="0" required
              class="w-full max-w-[180px] text-center bg-transparent outline-none placeholder-[#E5E5E5]">
          </div>
          <div class="w-12 h-[2px] bg-[var(--accent-light)] mt-2 rounded-full"></div>
        </div>

        <div>
          <h3 class="text-[11px] font-bold text-[#AFAFAF] mb-3 ml-2 tracking-widest uppercase">分類</h3>
          <div id="category-grid" class="grid grid-cols-4 gap-y-3 gap-x-2">
            </div>
        </div>

        <div id="expense-extra-fields" class="w-full space-y-3 pt-1 pb-1"></div>

        <div class="space-y-3 pt-1 w-full">
          <div class="relative w-full">
             <i data-lucide="calendar" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#D1D1D6]"></i>
             <input type="date" id="input-date" required
              class="w-full box-border bg-white pl-11 pr-4 py-3.5 rounded-[20px] shadow-sm border border-[#F0F0F0] text-[#5A5A5A] font-num font-bold outline-none focus:border-[var(--accent-muted)] focus:ring-2 focus:ring-[var(--accent-light)] transition-all appearance-none">
          </div>
          <div class="relative w-full">
             <i data-lucide="file-text" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-[#D1D1D6]"></i>
             <input type="text" id="input-note" placeholder="備註..."
              class="w-full box-border bg-white pl-11 pr-4 py-3.5 rounded-[20px] shadow-sm border border-[#F0F0F0] text-[#5A5A5A] font-bold outline-none focus:border-[var(--accent-muted)] focus:ring-2 focus:ring-[var(--accent-light)] transition-all placeholder-[#D1D1D6]">
          </div>
        </div>

        <!-- ✨ 修改：同樣移除發光陰影，換成乾淨的灰階陰影 -->
        <button type="submit" class="w-full bg-[var(--accent-primary)] hover:bg-[var(--accent-dark)] text-white font-bold text-lg py-3.5 rounded-[20px] shadow-[0_8px_16px_rgba(0,0,0,0.08)] transition-all active:scale-95 flex justify-center items-center gap-2 mt-auto tracking-wider shrink-0">
          <span id="btn-submit-text">完成</span>
        </button>
      </form>
    </div>
  </div>

  <div id="day-detail-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-[#FAFAF8]/80 backdrop-blur-md hidden max-w-md mx-auto p-4 sm:p-6">
    <div class="absolute inset-0" onclick="closeDayDetail()"></div>
    
    <div class="bg-white w-full rounded-[32px] shadow-[0_10px_40px_rgba(0,0,0,0.08)] p-6 animate-in zoom-in-95 fade-in duration-200 relative border border-[#F0F0F0] max-h-[75vh] flex flex-col">
      
      <div class="flex justify-between items-center mb-6 px-1 shrink-0">
        <div class="bg-[var(--bg-base)] px-4 py-1.5 rounded-full border border-white shadow-sm">
          <span id="detail-date-title" class="font-num font-bold text-[#83BA61] text-sm tracking-wide"></span>
        </div>
        <button onclick="closeDayDetail()" class="w-8 h-8 bg-[#F4F5F7] rounded-full flex items-center justify-center text-[#AFAFAF] hover:bg-[var(--accent-light)] hover:text-[var(--accent-dark)] transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <div id="detail-transactions-list" class="space-y-4 overflow-y-auto no-scrollbar px-1 pb-2">
      </div>
    </div>
  </div>

  <script>
    // ✨ 修改：加入莫蘭迪單色桌布 (只要把 grid 設為 transparent 就會變成純單色！)
    const WALLPAPERS = [
      { id: 'green', name: '粉綠格', base: '#F0F7EB', grid: 'rgba(162, 212, 137, 0.25)' },
      { id: 'blue', name: '粉藍格', base: '#F0F5F7', grid: 'rgba(137, 186, 212, 0.25)' },
      { id: 'pink', name: '粉紅格', base: '#F7F0F2', grid: 'rgba(212, 137, 162, 0.25)' },
      { id: 'yellow', name: '粉黃格', base: '#F7F7F0', grid: 'rgba(212, 202, 137, 0.25)' },
      { id: 'purple', name: '粉紫格', base: '#F5F0F7', grid: 'rgba(193, 137, 212, 0.25)' },
      { id: 'm_blue', name: '莫藍單', base: '#DCE4E8', grid: 'transparent' },
      { id: 'm_green', name: '莫綠單', base: '#DDE3DC', grid: 'transparent' },
      { id: 'm_pink', name: '莫粉單', base: '#EBE2E3', grid: 'transparent' },
      { id: 'm_purple', name: '莫紫單', base: '#E3DEE4', grid: 'transparent' },
      { id: 'm_grey', name: '莫灰單', base: '#E6E8E6', grid: 'transparent' },
    ];

    // ✨ 修改：加入莫蘭迪質感文字與按鈕配色
    const ACCENTS = [
      { id: 'purple', name: '粉紫', primary: '#A888F9', dark: '#7D5AE0', light: '#EAE1FB', muted: '#C7B5F8' },
      { id: 'blue', name: '粉藍', primary: '#6B9BED', dark: '#4A7BD4', light: '#E4EEFF', muted: '#9BBFF5' },
      { id: 'green', name: '粉綠', primary: '#83BA61', dark: '#5A9638', light: '#E4F9E9', muted: '#A3D188' },
      { id: 'pink', name: '櫻粉', primary: '#F08CAE', dark: '#D4668C', light: '#FFE4DE', muted: '#F5B0C7' },
      { id: 'orange', name: '橘黃', primary: '#F5C249', dark: '#D49D24', light: '#FFF8E1', muted: '#F7D57C' },
      { id: 'm_blue', name: '莫藍', primary: '#7B90A5', dark: '#5B7085', light: '#D9E2EB', muted: '#A5B7C8' },
      { id: 'm_green', name: '莫綠', primary: '#8EA591', dark: '#6B826E', light: '#DEE8E0', muted: '#B1C6B4' },
      { id: 'm_pink', name: '莫粉', primary: '#C28F9B', dark: '#9A6975', light: '#F0DCE1', muted: '#D9ABB6' },
      { id: 'm_purple', name: '莫紫', primary: '#9B8B9E', dark: '#756678', light: '#E4DCE5', muted: '#BCAEC0' },
      { id: 'm_grey', name: '莫灰', primary: '#9AA4A8', dark: '#758085', light: '#E0E5E8', muted: '#B6C1C6' },
    ];

    // 從記憶體讀取使用者設定的主題，預設為綠色桌布+紫色文字
    let currentWallpaper = localStorage.getItem('gg_wallpaper') || 'green';
    let currentAccent = localStorage.getItem('gg_accent') || 'purple';

    function applyTheme() {
      const wp = WALLPAPERS.find(w => w.id === currentWallpaper) || WALLPAPERS[0];
      const ac = ACCENTS.find(a => a.id === currentAccent) || ACCENTS[0];
      
      // 動態更新全域 CSS 變數
      document.documentElement.style.setProperty('--bg-base', wp.base);
      document.documentElement.style.setProperty('--bg-grid', wp.grid);
      document.documentElement.style.setProperty('--accent-primary', ac.primary);
      document.documentElement.style.setProperty('--accent-dark', ac.dark);
      document.documentElement.style.setProperty('--accent-light', ac.light);
      document.documentElement.style.setProperty('--accent-muted', ac.muted);
    }

    const EXPENSE_CATS = [
      { id: 'e1', name: '餐飲', icon: 'utensils', color: '#FFE4DE' },
      { id: 'e2', name: '交通', icon: 'bus', color: '#E4EEFF' },
      { id: 'e3', name: '購物', icon: 'shopping-bag', color: '#F8E8FA' },
      { id: 'e4', name: '娛樂', icon: 'film', color: '#E4F9E9' },
      { id: 'e5', name: '居住', icon: 'home', color: '#FFF8E1' },
      { id: 'e6', name: '零食', icon: 'coffee', color: '#F1E8DF' },
      { id: 'e7', name: '醫療', icon: 'pill', color: '#E3F9F6' },
      { id: 'e8', name: '其他', icon: 'sparkles', color: '#F2EBFC' },
    ];

    const INCOME_CATS = [
      { id: 'i1', name: '薪水', icon: 'briefcase', color: '#E4F9E9' },
      { id: 'i2', name: '零用錢', icon: 'coins', color: '#FFF8E1' },
      { id: 'i3', name: '獎金', icon: 'gift', color: '#F2EBFC' },
      { id: 'i4', name: '其他', icon: 'sparkles', color: '#E4EEFF' },
    ];

    let currentView = 'home';
    let modalType = 'expense';
    let selectedCategory = EXPENSE_CATS[0];
    
    const PAYMENT_METHODS = ['現金', '電子支付', '信用卡', '轉帳'];
    const EPAY_METHODS = ['Apple Pay', 'Line Pay', '街口支付', '悠遊卡', '全支付', '其他'];
    const CONSUMPTION_TYPES = ['實體消費', '線上消費'];
    
    let selectedPayment = '現金';
    let selectedEPay = 'Line Pay';
    let selectedConsumption = '實體消費';

    let editingTransactionId = null;

    let currentCalendarYear = new Date().getFullYear();
    let currentCalendarMonth = new Date().getMonth(); 
    
    let chartMode = 'month'; 
    let chartAnchorDate = new Date();
    let chartType = 'expense'; 
    let chartDimension = 'category'; 

    const CHART_META = {
      'payment': {
        '現金': { icon: 'banknote', color: '#FFF8E1' },
        '電子支付': { icon: 'smartphone', color: '#E4F9E9' },
        '信用卡': { icon: 'credit-card', color: '#E4EEFF' },
        '轉帳': { icon: 'arrow-right-left', color: '#F2EBFC' },
        '未指定': { icon: 'help-circle', color: '#F5F5F5' }
      },
      'consumption': {
        '實體消費': { icon: 'store', color: '#FFE4DE' },
        '線上消費': { icon: 'globe', color: '#EAE1FB' },
        '未指定': { icon: 'help-circle', color: '#F5F5F5' }
      }
    };

    const savedData = localStorage.getItem('green_gingham_transactions');
    let transactions = savedData ? JSON.parse(savedData) : [];

    const currentMonthPrefix = '2026-04';

    document.addEventListener('DOMContentLoaded', () => {
      applyTheme(); // 初始化佈景主題
      initDate();
      renderAll();
      switchType('expense');
      document.getElementById('add-form').addEventListener('submit', handleAddSubmit);
    });

    function formatMoney(num) {
      return num.toLocaleString('en-US');
    }

    function initDate() {
      const today = new Date();
      const dateStr = `${today.getFullYear()} . ${String(today.getMonth() + 1).padStart(2,'0')} . ${String(today.getDate()).padStart(2,'0')}`;
      document.getElementById('home-date').innerText = dateStr;
      
      const formDateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      document.getElementById('input-date').value = formDateStr; 
    }

    function renderAll() {
      renderHome();
      renderCalendar();
      renderChart();
      renderSettings(); // 繪製設定頁面選項
      lucide.createIcons();
    }

    function renderHome() {
      let income = 0; let expense = 0;
      transactions.filter(t => t.date.startsWith(currentMonthPrefix)).forEach(t => {
        if (t.type === 'income') income += t.amount;
        else expense += t.amount;
      });

      document.getElementById('home-income').innerText = `$${formatMoney(income)}`;
      document.getElementById('home-expense').innerText = `$${formatMoney(expense)}`;
      document.getElementById('home-balance').innerText = `$${formatMoney(income - expense)}`;

      const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
      const grouped = sorted.reduce((acc, t) => {
        if (!acc[t.date]) acc[t.date] = [];
        acc[t.date].push(t);
        return acc;
      }, {});

      const container = document.getElementById('home-transactions');
      
      if (transactions.length === 0) {
         // ✨ 修改：加入毛玻璃卡片底色，並加深文字顏色、為圖示套用主題色
         container.innerHTML = `
           <div class="text-center py-12 bg-white/60 backdrop-blur-md rounded-[32px] border border-white shadow-[0_4px_15px_rgba(0,0,0,0.02)]">
             <div class="w-16 h-16 bg-white rounded-[20px] flex items-center justify-center mx-auto mb-4 shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-[#F0F0F0]">
               <i data-lucide="inbox" class="w-6 h-6 text-[var(--accent-primary)] opacity-80"></i>
             </div>
             <p class="font-bold text-[14px] text-[#7A7A7A] tracking-wide">目前還沒有紀錄喔！</p>
           </div>
         `;
         return;
      }

      container.innerHTML = '';
      Object.keys(grouped).forEach(date => {
        const dateHtml = `
          <div class="mb-6">
            <div class="inline-block bg-white border border-[#F0F0F0] px-3 py-1 rounded-full mb-3 ml-1">
               <span class="text-[11px] font-bold text-[var(--accent-primary)] font-num transition-colors">${date.substring(5).replace('-', '/')}</span>
            </div>
            <div class="bg-white rounded-[24px] shadow-[0_2px_15px_rgba(0,0,0,0.015)] border border-[#F5F5F5] overflow-hidden">
              ${grouped[date].map((t, index) => `
                <div onclick="openModal(${t.id})" class="flex items-center justify-between p-4 ${index !== grouped[date].length - 1 ? 'border-b border-[#F8F8F8]' : ''} hover:bg-[#FAFAF8] transition-colors cursor-pointer active:bg-[#F0F0F0]">
                  <div class="flex items-center gap-4">
                    <div class="w-[52px] h-[52px] rounded-full flex items-center justify-center" style="background-color: ${t.color}">
                      <i data-lucide="${t.icon}" class="w-6 h-6 text-[#7A7A7A] stroke-[1.5]"></i>
                    </div>
                    <div class="flex flex-col justify-center items-start">
                      <div class="flex items-center flex-wrap gap-1">
                        <p class="font-bold text-[#4A4A4A] text-[15px] m-0 leading-tight">${t.category}</p>
                        ${t.type === 'expense' && t.paymentMethod ? `<span class="text-[9px] bg-[var(--bg-base)] text-[#83BA61] px-1.5 py-[2px] rounded-md font-bold transition-colors">${t.paymentMethod === '電子支付' && t.ePayMethod ? t.ePayMethod : t.paymentMethod}</span>` : ''}
                        ${t.type === 'expense' && t.consumptionType === '線上消費' ? `<span class="text-[9px] bg-[var(--accent-light)] text-[var(--accent-primary)] px-1.5 py-[2px] rounded-md font-bold transition-colors">線上</span>` : ''}
                      </div>
                      ${t.note ? `<p class="text-[12px] text-[#AFAFAF] mt-1 m-0">${t.note}</p>` : ''}
                    </div>
                  </div>
                  <span class="font-bold text-[17px] font-num ${t.type === 'income' ? 'text-[#83BA61]' : 'text-[#5A5A5A]'}">
                    ${t.type === 'income' ? '+' : '-'}$${formatMoney(t.amount)}
                  </span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', dateHtml);
      });
    }

    function renderCalendar() {
      const year = currentCalendarYear; 
      const month = currentCalendarMonth; 
      
      document.getElementById('calendar-month-display').innerText = `${year}.${String(month + 1).padStart(2, '0')}`;

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const weekDays = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
      let html = '';

      weekDays.forEach(d => {
        html += `<div class="text-[11px] font-bold text-[var(--accent-muted)] mb-2 transition-colors">${d}</div>`;
      });

      for (let i = 0; i < firstDay; i++) html += `<div></div>`;

      const today = new Date();
      const todayStr = `${today.getFullYear()}-0${today.getMonth() + 1}-${String(today.getDate()).padStart(2, '0')}`;

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-0${month + 1}-${String(day).padStart(2, '0')}`;
        const dayTrans = transactions.filter(t => t.date === dateStr);
        const hasData = dayTrans.length > 0;
        const isToday = (dateStr === todayStr);

        let circleClass = 'text-[#5A5A5A] font-medium';
        if (isToday) circleClass = 'bg-[var(--accent-primary)] text-white font-bold shadow-md';
        else if (hasData) circleClass = 'bg-[#white] border border-[#F0F0F0] text-[#4A4A4A] font-medium shadow-sm';

        let dotHtml = '';
        if (hasData && !isToday) {
          dotHtml = `<div class="absolute bottom-1 right-2 w-1.5 h-1.5 bg-[#D1D1D6] rounded-full"></div>`;
        } else if (hasData && isToday) {
          dotHtml = `<div class="absolute bottom-0 right-0 bg-white rounded-full p-[2px] shadow-sm"><i data-lucide="coffee" class="w-2.5 h-2.5 text-[var(--accent-primary)] transition-colors"></i></div>`;
        }

        html += `
          <div onclick="openDayDetail('${dateStr}')" class="flex flex-col items-center justify-center relative h-12 cursor-pointer font-num transition-transform hover:scale-110 active:scale-95">
            <div class="w-10 h-10 flex items-center justify-center rounded-full text-[15px] transition-colors duration-300 ${circleClass}">
              ${day}
            </div>
            ${dotHtml}
          </div>
        `;
      }
      document.getElementById('calendar-grid').innerHTML = html;
    }

    function prevMonth() {
      currentCalendarMonth--;
      if (currentCalendarMonth < 0) {
        currentCalendarMonth = 11;
        currentCalendarYear--;
      }
      renderCalendar();
      lucide.createIcons();
    }

    function nextMonth() {
      currentCalendarMonth++;
      if (currentCalendarMonth > 11) {
        currentCalendarMonth = 0;
        currentCalendarYear++;
      }
      renderCalendar();
      lucide.createIcons();
    }

    function getWeekRange(date) {
      const d = new Date(date.getTime());
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const start = new Date(d.setDate(diff));
      const end = new Date(start.getTime());
      end.setDate(end.getDate() + 6);
      return { start, end };
    }

    function formatDateYYYYMMDD(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function setChartMode(mode) {
      chartMode = mode;
      ['day', 'week', 'month', 'year'].forEach(m => {
        const btn = document.getElementById(`btn-mode-${m}`);
        if (m === mode) {
          btn.className = 'px-3.5 py-1.5 rounded-full transition-colors bg-white text-[var(--accent-dark)] shadow-sm border border-[#F0F0F0]';
        } else {
          btn.className = 'px-3.5 py-1.5 rounded-full transition-colors text-[#AFAFAF] hover:text-[#4A4A4A] border border-transparent';
        }
      });
      renderChart();
    }

    function prevChartPeriod() {
      if (chartMode === 'month') chartAnchorDate.setMonth(chartAnchorDate.getMonth() - 1);
      else if (chartMode === 'year') chartAnchorDate.setFullYear(chartAnchorDate.getFullYear() - 1);
      else if (chartMode === 'week') chartAnchorDate.setDate(chartAnchorDate.getDate() - 7);
      else if (chartMode === 'day') chartAnchorDate.setDate(chartAnchorDate.getDate() - 1);
      renderChart();
    }

    function nextChartPeriod() {
      if (chartMode === 'month') chartAnchorDate.setMonth(chartAnchorDate.getMonth() + 1);
      else if (chartMode === 'year') chartAnchorDate.setFullYear(chartAnchorDate.getFullYear() + 1);
      else if (chartMode === 'week') chartAnchorDate.setDate(chartAnchorDate.getDate() + 7);
      else if (chartMode === 'day') chartAnchorDate.setDate(chartAnchorDate.getDate() + 1);
      renderChart();
    }

    function setChartType(type) {
      chartType = type;
      const btnExp = document.getElementById('chart-tab-expense');
      const btnInc = document.getElementById('chart-tab-income');
      const dimTabs = document.getElementById('chart-dimension-tabs');
      
      if (type === 'expense') {
        btnExp.className = 'flex-1 py-1.5 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';
        btnInc.className = 'flex-1 py-1.5 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent';
        document.getElementById('chart-center-label').innerText = '總支出';
        dimTabs.style.display = 'flex';
      } else {
        btnExp.className = 'flex-1 py-1.5 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent';
        btnInc.className = 'flex-1 py-1.5 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';
        document.getElementById('chart-center-label').innerText = '總收入';
        dimTabs.style.display = 'none';
      }
      renderChart();
    }

    function setChartDimension(dim) {
      chartDimension = dim;
      ['category', 'payment', 'consumption'].forEach(d => {
        const btn = document.getElementById(`dim-tab-${d}`);
        if (d === dim) {
          btn.className = 'flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all bg-[var(--accent-light)] text-[var(--accent-dark)] shadow-sm';
        } else {
          btn.className = 'flex-1 py-1.5 rounded-[12px] text-[12px] font-bold transition-all text-[#AFAFAF] hover:bg-[#F8F9FA]';
        }
      });
      renderChart();
    }

    function renderChart() {
      const displayEl = document.getElementById('chart-period-display');
      let startDateStr, endDateStr;

      if (chartMode === 'month') {
        displayEl.innerText = `${chartAnchorDate.getFullYear()} . ${String(chartAnchorDate.getMonth() + 1).padStart(2, '0')}`;
      } else if (chartMode === 'year') {
        displayEl.innerText = `${chartAnchorDate.getFullYear()}`;
      } else if (chartMode === 'week') {
        const { start, end } = getWeekRange(chartAnchorDate);
        startDateStr = formatDateYYYYMMDD(start);
        endDateStr = formatDateYYYYMMDD(end);
        displayEl.innerText = `${String(start.getMonth() + 1).padStart(2, '0')}.${String(start.getDate()).padStart(2, '0')} - ${String(end.getMonth() + 1).padStart(2, '0')}.${String(end.getDate()).padStart(2, '0')}`;
      } else if (chartMode === 'day') {
        displayEl.innerText = `${chartAnchorDate.getFullYear()} . ${String(chartAnchorDate.getMonth() + 1).padStart(2, '0')} . ${String(chartAnchorDate.getDate()).padStart(2, '0')}`;
      }

      let totalExpense = 0;
      const expenses = transactions.filter(t => {
        if (t.type !== chartType) return false;
        
        if (chartMode === 'month') {
          const prefix = `${chartAnchorDate.getFullYear()}-${String(chartAnchorDate.getMonth() + 1).padStart(2, '0')}`;
          return t.date.startsWith(prefix);
        } else if (chartMode === 'year') {
          const prefix = `${chartAnchorDate.getFullYear()}`;
          return t.date.startsWith(prefix);
        } else if (chartMode === 'week') {
          return t.date >= startDateStr && t.date <= endDateStr;
        } else if (chartMode === 'day') {
          return t.date === formatDateYYYYMMDD(chartAnchorDate);
        }
        return false;
      });
      
      const grouped = expenses.reduce((acc, t) => {
        totalExpense += t.amount;
        
        let groupName, groupIcon, groupColor;

        if (chartType === 'income' || chartDimension === 'category') {
          groupName = t.category;
          groupIcon = t.icon;
          groupColor = t.color;
        } else if (chartDimension === 'payment') {
          groupName = (t.paymentMethod === '電子支付' && t.ePayMethod) ? t.ePayMethod : (t.paymentMethod || '未指定');
          groupIcon = CHART_META.payment[t.paymentMethod]?.icon || 'help-circle';
          groupColor = CHART_META.payment[t.paymentMethod]?.color || '#F5F5F5';
        } else if (chartDimension === 'consumption') {
          groupName = t.consumptionType || '未指定';
          groupIcon = CHART_META.consumption[t.consumptionType]?.icon || 'help-circle';
          groupColor = CHART_META.consumption[t.consumptionType]?.color || '#F5F5F5';
        }

        const existing = acc.find(c => c.name === groupName);
        if (existing) existing.amount += t.amount;
        else acc.push({ name: groupName, amount: t.amount, color: groupColor, icon: groupIcon });
        return acc;
      }, []);
      
      grouped.sort((a, b) => b.amount - a.amount);

      document.getElementById('chart-total').innerText = `$${formatMoney(totalExpense)}`;
      const donut = document.getElementById('chart-donut');
      const emptyState = document.getElementById('chart-empty');

      if (totalExpense > 0) {
        emptyState.classList.add('hidden');
        let cumulativePercent = 0;
        const gradientStops = grouped.map(item => {
          const percent = (item.amount / totalExpense) * 100;
          const start = cumulativePercent;
          const end = cumulativePercent + percent;
          cumulativePercent = end;
          return `${item.color} ${start}% ${end}%`;
        }).join(', ');
        donut.style.background = `conic-gradient(${gradientStops})`;
      } else {
        emptyState.classList.remove('hidden');
        donut.style.background = 'transparent';
      }

      const listContainer = document.getElementById('chart-list');
      listContainer.innerHTML = grouped.map(item => {
        const percent = ((item.amount / totalExpense) * 100).toFixed(1);
        return `
          <div class="flex items-center justify-between group">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background-color: ${item.color}">
                 <i data-lucide="${item.icon}" class="w-5 h-5 text-[#7A7A7A] stroke-[1.5]"></i>
              </div>
              <span class="text-[#4A4A4A] font-bold text-[15px]">${item.name}</span>
            </div>
            <div class="flex items-center gap-4">
              <span class="text-[#D1D1D6] font-num text-sm font-bold w-10 text-right">${percent}%</span>
              <span class="font-bold text-[#5A5A5A] font-num text-lg w-16 text-right">$${formatMoney(item.amount)}</span>
            </div>
          </div>
        `;
      }).join('');
      
      lucide.createIcons();
    }

    // ✨ 新增：繪製設定頁面選項
    function renderSettings() {
      const wallpaperGrid = document.getElementById('wallpaper-options');
      const accentGrid = document.getElementById('accent-options');
      
      if (wallpaperGrid) {
        wallpaperGrid.innerHTML = WALLPAPERS.map(w => `
          <button onclick="setWallpaper('${w.id}')" class="flex flex-col items-center gap-2 group">
            <div class="w-12 h-12 rounded-[16px] border-[3px] ${w.id === currentWallpaper ? 'border-[var(--accent-primary)] shadow-md scale-105' : 'border-transparent shadow-sm'} transition-all overflow-hidden relative" style="background-color: ${w.base}">
               <div class="absolute inset-0" style="background-image: linear-gradient(90deg, ${w.grid} 50%, transparent 50%), linear-gradient(${w.grid} 50%, transparent 50%); background-size: 16px 16px;"></div>
            </div>
            <span class="text-[11px] font-bold transition-colors ${w.id === currentWallpaper ? 'text-[var(--accent-primary)]' : 'text-[#AFAFAF] group-hover:text-[#4A4A4A]'}">${w.name}</span>
          </button>
        `).join('');
      }

      if (accentGrid) {
        accentGrid.innerHTML = ACCENTS.map(a => `
          <button onclick="setAccent('${a.id}')" class="flex flex-col items-center gap-2 group">
            <div class="w-10 h-10 rounded-full flex items-center justify-center transition-all ${a.id === currentAccent ? 'ring-[3px] ring-[var(--accent-light)] scale-110 shadow-md' : 'shadow-sm'}" style="background-color: ${a.primary}">
              ${a.id === currentAccent ? '<i data-lucide="check" class="w-5 h-5 text-white"></i>' : ''}
            </div>
            <span class="text-[11px] font-bold transition-colors ${a.id === currentAccent ? 'text-[var(--accent-primary)]' : 'text-[#AFAFAF] group-hover:text-[#4A4A4A]'}">${a.name}</span>
          </button>
        `).join('');
      }
      
      lucide.createIcons();
    }

    function setWallpaper(id) {
      currentWallpaper = id;
      localStorage.setItem('gg_wallpaper', id);
      applyTheme();
      renderSettings();
    }

    function setAccent(id) {
      currentAccent = id;
      localStorage.setItem('gg_accent', id);
      applyTheme();
      renderSettings();
      switchView(currentView); // 重新上色導覽列
      renderCalendar(); // 重新上色日曆
      renderHome(); // 重新上色首頁文字
    }

    function switchView(viewName) {
      currentView = viewName;
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.getElementById(`view-${viewName}`).classList.add('active');
      
      const btns = ['home', 'calendar', 'chart', 'settings'];
      btns.forEach(btn => {
        const el = document.getElementById(`nav-${btn}`);
        const dot = el.querySelector('.active-dot');
        
        if (btn === viewName) {
          el.className = 'nav-btn p-2 text-[var(--accent-primary)] scale-110 transition-colors duration-300 relative';
          dot.style.backgroundColor = 'var(--accent-primary)';
        } else {
          el.className = 'nav-btn p-2 text-[#D1D1D6] hover:text-[var(--accent-muted)] transition-colors duration-300 relative';
          dot.style.backgroundColor = 'transparent';
        }
      });
      
      // 切換到設定頁面時，確保選項是最新狀態
      if (viewName === 'settings') {
        renderSettings();
      }
    }

    function openModal(id = null) {
      editingTransactionId = id;
      
      const delBtn = document.getElementById('btn-delete-tx');
      const submitBtnText = document.getElementById('btn-submit-text');

      if (id) {
        const t = transactions.find(x => x.id === id);
        if (t) {
          document.getElementById('input-amount').value = t.amount;
          document.getElementById('input-date').value = t.date;
          document.getElementById('input-note').value = t.note || '';
          
          switchType(t.type); 
          
          const catList = t.type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
          const matchedCat = catList.find(c => c.name === t.category);
          if(matchedCat) selectCategory(matchedCat.id);

          if (t.type === 'expense') {
            if(t.paymentMethod) selectPayment(t.paymentMethod);
            if(t.ePayMethod) selectEPay(t.ePayMethod);
            if(t.consumptionType) selectConsumption(t.consumptionType);
          }
          
          submitBtnText.innerText = '儲存修改';
          delBtn.classList.remove('hidden'); 
        }
      } else {
        document.getElementById('input-amount').value = '';
        document.getElementById('input-note').value = '';
        initDate();
        switchType('expense');
        
        submitBtnText.innerText = '完成';
        delBtn.classList.add('hidden'); 
      }

      document.getElementById('add-modal').classList.remove('hidden');
    }
    
    function closeModal() {
      document.getElementById('add-modal').classList.add('hidden');
      document.getElementById('input-amount').value = '';
      document.getElementById('input-note').value = '';
      editingTransactionId = null; 
    }

    function deleteTransaction() {
      if(confirm('確定要刪除這筆紀錄嗎？')) {
        transactions = transactions.filter(t => t.id !== editingTransactionId);
        localStorage.setItem('green_gingham_transactions', JSON.stringify(transactions));
        
        renderAll();
        closeModal();
        closeDayDetail(); 
      }
    }

    function switchType(type) {
      modalType = type;
      const btnExp = document.getElementById('tab-expense');
      const btnInc = document.getElementById('tab-income');
      const extraFields = document.getElementById('expense-extra-fields'); 
      
      if (type === 'expense') {
        btnExp.className = 'px-8 py-2 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';
        btnInc.className = 'px-8 py-2 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent';
        extraFields.classList.remove('hidden'); 
        renderCategories(EXPENSE_CATS);
        renderExtraFields(); 
      } else {
        btnExp.className = 'px-8 py-2 rounded-full transition-all duration-300 text-[#AFAFAF] border border-transparent';
        btnInc.className = 'px-8 py-2 rounded-full transition-all duration-300 bg-white text-[#4A4A4A] shadow-sm border border-[#F0F0F0]';
        extraFields.classList.add('hidden'); 
        renderCategories(INCOME_CATS);
      }
    }

    function renderCategories(cats) {
      selectedCategory = cats[0]; 
      const container = document.getElementById('category-grid');
      
      const updateGrid = () => {
        container.innerHTML = cats.map(cat => {
          const isSelected = selectedCategory.id === cat.id;
          const btnClass = isSelected 
            ? `bg-white shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-[var(--accent-light)] scale-105 ring-[3px] ring-[var(--accent-light)]`
            : `hover:bg-white text-[#B0B0B0] border border-transparent`;
            
          const textClass = isSelected ? 'text-[#4A4A4A]' : '';

          return `
            <button type="button" onclick="selectCategory('${cat.id}')" class="flex flex-col items-center py-3 rounded-2xl transition-all duration-200 ${btnClass}">
              <div class="w-[42px] h-[42px] rounded-full flex items-center justify-center mb-2" style="background-color: ${cat.color}">
                <i data-lucide="${cat.icon}" class="w-5 h-5 text-[#7A7A7A] stroke-[1.5]"></i>
              </div>
              <span class="text-[12px] font-bold ${textClass}">${cat.name}</span>
            </button>
          `;
        }).join('');
        lucide.createIcons();
      };
      
      window.selectCategory = (id) => {
        selectedCategory = cats.find(c => c.id === id);
        updateGrid();
      };

      updateGrid();
    }

    function renderExtraFields() {
      let html = `
        <div>
          <h3 class="text-[10px] font-bold text-[#AFAFAF] mb-2 ml-2 tracking-widest uppercase">付款方式</h3>
          <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1 px-1">
            ${PAYMENT_METHODS.map(m => `
              <button type="button" onclick="selectPayment('${m}')" class="shrink-0 px-3.5 py-1.5 rounded-full text-[12px] font-bold transition-colors ${selectedPayment === m ? 'bg-white shadow-sm border border-[var(--accent-light)] text-[var(--accent-dark)]' : 'text-[#AFAFAF] border border-transparent hover:bg-white/50'}">${m}</button>
            `).join('')}
          </div>
        </div>
      `;

      if (selectedPayment === '電子支付') {
        html += `
          <div class="animate-in fade-in slide-in-from-top-1 duration-200 pl-1">
            <div class="flex flex-wrap gap-1.5 px-1 bg-white/40 p-2 rounded-[16px] border border-white/50 shadow-inner">
              ${EPAY_METHODS.map(m => `
                <button type="button" onclick="selectEPay('${m}')" class="px-2.5 py-1.5 rounded-full text-[11px] font-bold transition-colors ${selectedEPay === m ? 'bg-[var(--accent-light)] text-[var(--accent-dark)] shadow-sm' : 'text-[#AFAFAF] hover:bg-white'}">${m}</button>
              `).join('')}
            </div>
          </div>
        `;
      }

      html += `
        <div>
          <h3 class="text-[10px] font-bold text-[#AFAFAF] mb-2 ml-2 tracking-widest uppercase">消費類型</h3>
          <div class="flex gap-2 px-1">
            ${CONSUMPTION_TYPES.map(m => `
              <button type="button" onclick="selectConsumption('${m}')" class="flex-1 py-1.5 rounded-full text-[12px] font-bold transition-colors ${selectedConsumption === m ? 'bg-white shadow-sm border border-[var(--accent-light)] text-[var(--accent-dark)]' : 'text-[#AFAFAF] border border-transparent hover:bg-white/50'}">${m}</button>
            `).join('')}
          </div>
        </div>
      `;
      document.getElementById('expense-extra-fields').innerHTML = html;
    }

    window.selectPayment = (m) => { selectedPayment = m; renderExtraFields(); };
    window.selectEPay = (m) => { selectedEPay = m; renderExtraFields(); };
    window.selectConsumption = (m) => { selectedConsumption = m; renderExtraFields(); };

    function handleAddSubmit(e) {
      e.preventDefault();
      const amountStr = document.getElementById('input-amount').value;
      const date = document.getElementById('input-date').value;
      const note = document.getElementById('input-note').value;
      
      if (!amountStr || isNaN(amountStr) || Number(amountStr) <= 0) return;

      const newTx = {
        id: Date.now(),
        type: modalType,
        amount: parseFloat(amountStr),
        category: selectedCategory.name,
        icon: selectedCategory.icon,
        color: selectedCategory.color,
        date: date,
        note: note,
        paymentMethod: modalType === 'expense' ? selectedPayment : null,
        ePayMethod: (modalType === 'expense' && selectedPayment === '電子支付') ? selectedEPay : null,
        consumptionType: modalType === 'expense' ? selectedConsumption : null
      };

      if (editingTransactionId) {
        transactions = transactions.map(t => t.id === editingTransactionId ? newTx : t);
      } else {
        transactions.unshift(newTx);
      }
      
      localStorage.setItem('green_gingham_transactions', JSON.stringify(transactions));

      renderAll();
      closeModal();
      closeDayDetail();
    }

    function openDayDetail(dateStr) {
      const dayTrans = transactions.filter(t => t.date === dateStr);
      
      document.getElementById('detail-date-title').innerText = dateStr.replace(/-/g, ' . ');

      const listContainer = document.getElementById('detail-transactions-list');
      
      if (dayTrans.length === 0) {
        listContainer.innerHTML = `
          <div class="text-center py-10 text-[#AFAFAF]">
            <i data-lucide="coffee" class="w-8 h-8 mx-auto mb-3 opacity-30 text-[#83BA61]"></i>
            <p class="font-bold text-[13px] tracking-widest">這天沒有記帳紀錄喔</p>
          </div>
        `;
      } else {
        listContainer.innerHTML = `
          <div class="bg-white rounded-[24px] shadow-[0_2px_15px_rgba(0,0,0,0.015)] border border-[#F5F5F5] overflow-hidden">
            ${dayTrans.map((t, index) => `
              <div onclick="openModal(${t.id})" class="flex items-center justify-between p-4 ${index !== dayTrans.length - 1 ? 'border-b border-[#F8F8F8]' : ''} hover:bg-[#FAFAF8] transition-colors cursor-pointer active:bg-[#F0F0F0]">
                <div class="flex items-center gap-4">
                  <div class="w-[46px] h-[46px] rounded-full flex items-center justify-center" style="background-color: ${t.color}">
                    <i data-lucide="${t.icon}" class="w-5 h-5 text-[#7A7A7A] stroke-[1.5]"></i>
                  </div>
                  <div class="flex flex-col justify-center items-start">
                    <div class="flex items-center flex-wrap gap-1">
                      <p class="font-bold text-[#4A4A4A] text-[14px] m-0 leading-tight">${t.category}</p>
                      ${t.type === 'expense' && t.paymentMethod ? `<span class="text-[9px] bg-[var(--bg-base)] text-[#83BA61] px-1.5 py-[2px] rounded-md font-bold transition-colors">${t.paymentMethod === '電子支付' && t.ePayMethod ? t.ePayMethod : t.paymentMethod}</span>` : ''}
                      ${t.type === 'expense' && t.consumptionType === '線上消費' ? `<span class="text-[9px] bg-[var(--accent-light)] text-[var(--accent-primary)] px-1.5 py-[2px] rounded-md font-bold transition-colors">線上</span>` : ''}
                    </div>
                    ${t.note ? `<p class="text-[11px] text-[#AFAFAF] mt-1 m-0">${t.note}</p>` : ''}
                  </div>
                </div>
                <span class="font-bold text-[16px] font-num ${t.type === 'income' ? 'text-[#83BA61]' : 'text-[#5A5A5A]'}">
                  ${t.type === 'income' ? '+' : '-'}$${formatMoney(t.amount)}
                </span>
              </div>
            `).join('')}
          </div>
        `;
      }
      
      document.getElementById('day-detail-modal').classList.remove('hidden');
      lucide.createIcons(); 
    }

    function closeDayDetail() {
      document.getElementById('day-detail-modal').classList.add('hidden');
    }

    // ✨ 新增：匯出資料成 CSV 檔案的函式
    function exportToCSV() {
      if (transactions.length === 0) {
        alert('目前還沒有任何記帳紀錄可以匯出喔！');
        return;
      }

      // 1. 加入 BOM (Byte Order Mark)，讓 Excel 打開時不會有中文亂碼
      let csvContent = "\uFEFF"; 
      
      // 2. 建立標題列
      csvContent += "日期,收支類型,分類,金額,付款方式,消費類型,備註\n";

      // 3. 依序將每一筆資料轉換成 CSV 格式
      transactions.forEach(t => {
        const typeStr = t.type === 'income' ? '收入' : '支出';
        const payment = t.type === 'expense' ? (t.paymentMethod === '電子支付' && t.ePayMethod ? t.ePayMethod : (t.paymentMethod || '未指定')) : '-';
        const consumption = t.type === 'expense' ? (t.consumptionType || '未指定') : '-';
        
        // 將備註裡的「半形逗號」替換成「全形逗號」，避免破壞 CSV 的欄位分隔規則
        const safeNote = t.note ? t.note.replace(/,/g, "，") : ''; 

        const row = `${t.date},${typeStr},${t.category},${t.amount},${payment},${consumption},${safeNote}`;
        csvContent += row + "\n";
      });

      // 4. 產生下載連結並自動點擊觸發下載
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      
      // 自動生成檔名：方格子記帳本_備份_YYYY-MM-DD.csv
      const today = new Date();
      const dateString = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
      
      link.setAttribute("href", url);
      link.setAttribute("download", `方格子記帳本_備份_${dateString}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
